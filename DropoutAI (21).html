const AutoRegisterScreen = ({ email: _emailProp, pwd: _pwdProp, role="student", existingEmails=[], depts=DEPTS, onComplete, onCancel }) => {
  const [form, setForm] = useState({ name:"", email:"", dept:"", year:"", dob:"", confirmPwd:"", lecPwd:"", lecConfirmPwd:"" });
  const [error, setError] = useState("");
  const [pwdStrength, setPwdStrength] = useState({ valid:false, msg:"" });
  const upd = (k,v) => setForm(f => ({...f,[k]:v}));
  const isLecturer = role === "lecturer";

  // Validate university email format: xx.lastname@unik.ac.ug
  const isValidUnikEmail = (e) => /^[a-z]+\.[a-z]+@unik\.ac\.ug$/.test(e.toLowerCase().trim());

  // Validate lecturer password: letters + numbers + symbols, max 8 chars
  const validateLecPwd = (p) => {
    if(!p) return { valid:false, msg:"" };
    if(p.length > 8) return { valid:false, msg:"Password must not exceed 8 characters." };
    if(p.length < 4) return { valid:false, msg:"Password must be at least 4 characters." };
    const hasLetter = /[a-zA-Z]/.test(p);
    const hasNumber = /[0-9]/.test(p);
    const hasSymbol = /[^a-zA-Z0-9]/.test(p);
    if(!hasLetter) return { valid:false, msg:"Password must contain at least one letter." };
    if(!hasNumber) return { valid:false, msg:"Password must contain at least one number." };
    if(!hasSymbol) return { valid:false, msg:"Password must contain at least one symbol (e.g. @, #, !)." };
    return { valid:true, msg:"Strong password!" };
  };

  // Generate password from DOB: DDMMYYYY
  const generatePwd = (dob) => {
    if(!dob) return "";
    const [y, m, d] = dob.split("-");
    return `${d}${m}${y}`;
  };

  const generatedPwd = generatePwd(form.dob);
  const lecPwdCheck = validateLecPwd(form.lecPwd);

  const submit = () => {
    if(!form.name.trim()) { setError("Full name is required."); return; }
    if(isLecturer) {
      const emailVal = form.email.toLowerCase().trim();
      if(!emailVal) { setError("Email address is required."); return; }
      if(!emailVal.includes("@")) { setError("Please enter a valid email address."); return; }
      if(existingEmails.includes(emailVal)) { setError("An account with this email already exists. Please log in."); return; }
      if(!form.dept) { setError("Please select your department."); return; }
      if(!form.lecPwd) { setError("Password is required."); return; }
      if(!lecPwdCheck.valid) { setError(lecPwdCheck.msg || "Invalid password."); return; }
      if(form.lecPwd !== form.lecConfirmPwd) { setError("Passwords do not match."); return; }
      onComplete({ name: form.name.trim(), dept: form.dept, year: "", email: emailVal, pwd: form.lecPwd, studentId: null, dob: "" });
      return;
    }
    // Student
    const emailVal = form.email.toLowerCase().trim();
    if(!emailVal)        { setError("University email is required."); return; }
    if(!isValidUnikEmail(emailVal)) { setError("Email must be in the format: jn.namayanja@unik.ac.ug"); return; }
    if(existingEmails.includes(emailVal)) { setError("An account with this email already exists. Please log in."); return; }
    if(!form.dob)        { setError("Date of birth is required."); return; }
    if(!form.confirmPwd || form.confirmPwd !== generatedPwd) { setError("Please confirm your password by re-entering your date of birth in DDMMYYYY format."); return; }
    if(!form.dept)       { setError("Please select your department."); return; }
    if(!form.year)       { setError("Please select your year of study."); return; }
    const studentId = "STU-" + String(Date.now()).slice(-5);
    onComplete({ name: form.name.trim(), dept: form.dept, year: form.year, email: emailVal, pwd: generatedPwd, studentId, dob: form.dob });
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20, background:"var(--bg)" }}>
      <div style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:20, padding:36, width:"100%", maxWidth:440, animation:"fadeUp .4s ease" }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", marginBottom:12 }}>
            <img src="C:\Users\USER\Desktop\updated system\cropped-cropped-UniKWebiste-Hi-removebg-preview.png" alt="University of Kisubi" style={{ width:210, height:74, objectFit:"contain" }} />
          </div>
          <div style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>Complete Your Registration</div>
          <div style={{ fontSize:13, color:"var(--tx3)", lineHeight:1.6 }}>
            Welcome! Fill in your details to create your {isLecturer ? "lecturer" : "student"} account.<br/>
            <span style={{ color:"var(--amber)", fontWeight:600 }}>These cannot be changed later.</span>
          </div>
        </div>

        <div style={{ background: isLecturer ? "rgba(139,92,246,.08)" : "rgba(14,165,233,.08)", border:`1px solid ${isLecturer ? "rgba(139,92,246,.2)" : "rgba(14,165,233,.2)"}`, borderRadius:9, padding:"10px 14px", fontSize:12, color: isLecturer ? "#8b5cf6" : "#0ea5e9", marginBottom:18, display:"flex", gap:8, alignItems:"flex-start" }}>
          <span style={{ fontSize:16, flexShrink:0 }}><i className="fa fa-info-circle"></i></span>
          <span>{isLecturer ? "Use your own email and choose a password (letters + numbers + symbols, max 8 characters)." : "Use your university email (e.g. jn.namayanja@unik.ac.ug). Your password is your date of birth in DDMMYYYY format."}</span>
        </div>

        <FieldGroup label="Full Name" required>
          <input value={form.name} onChange={e=>upd("name",e.target.value)} placeholder={isLecturer ? "e.g. Dr. John Okafor" : "e.g. John Nathan Namayanja"} autoFocus />
        </FieldGroup>

        {/* Lecturer: own email */}
        {isLecturer && (
        <FieldGroup label="Email Address" required>
          <input type="email" value={form.email} onChange={e=>upd("email",e.target.value.toLowerCase())} placeholder="e.g. dr.okafor@gmail.com" />

        {/* Lecturer password fields */}
        {isLecturer && (
        <FieldGroup label="Password" required>
          <input type="password" value={form.lecPwd} onChange={e => { upd("lecPwd", e.target.value); }} placeholder="e.g. Dr@2024 (max 8 chars)" maxLength={8} />
          {form.lecPwd && (
            <div style={{ fontSize:11, marginTop:5, display:"flex", alignItems:"center", gap:6,
              color: lecPwdCheck.valid ? "var(--green)" : form.lecPwd.length > 0 ? "var(--red)" : "var(--tx3)" }}>
              <i className={`fa fa-${lecPwdCheck.valid ? "check-circle" : "times-circle"}`}></i>

        {isLecturer && form.lecPwd && lecPwdCheck.valid && (

          <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", marginBottom:12 }}>

          </div>
          <div style={{ lineHeight:1.4 }}>
            <div style={{ fontSize:20, fontWeight:800, letterSpacing:"-0.01em", color:"var(--tx)" }}>DropoutAI</div>

                style={{ ...S.tag(selectedRole===r ? t.primary : t.primary), cursor:"pointer", border:`1px solid ${t.primary}40`,
                  background: selectedRole===r ? t.primary : `${t.primary}20`,
                  color: selectedRole===r ? "#fff" : t.primary,
                  fontFamily:"var(--mono)", fontSize:11, fontWeight:700,
                  display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:100,
                  transition:"all .15s", outline:"none" }}
                onMouseEnter={e => { if(selectedRole!==r){ e.currentTarget.style.background=t.primary; e.currentTarget.style.color="#fff"; }}}
                onMouseLeave={e => { if(selectedRole!==r){ e.currentTarget.style.background=`${t.primary}20`; e.currentTarget.style.color=t.primary; }}}>
                {t.emoji} {t.label}

            ))}
          </div>
        </div>

        <FieldGroup label="University Email">
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder={selectedRole==="student" ? "jn.namayanja@unik.ac.ug" : selectedRole==="lecturer" ? "dr.okafor@unik.ac.ug" : "admin@uni.ac.ug"} />
        </FieldGroup>
        {selectedRole === "student" ? (
          <FieldGroup label="Password (Date of Birth)">
            <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="DDMMYYYY  e.g. 15031999" onKeyDown={e => e.key==="Enter" && attemptLogin(email,pwd)} />
            <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}>
              <i className="fa fa-info-circle" style={{marginRight:4}}></i>Enter your date of birth as Day, Month, Year (e.g. 15031999 for 15 March 1999)

        ) : (
          <FieldGroup label="Password">
            <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key==="Enter" && attemptLogin(email,pwd)} />
          </FieldGroup>
        )}
        {error && <Alert type="error" style={{ marginBottom:12 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}
        <Btn size="lg" onClick={() => {
          if(regMode && selectedRole === "student") {
            // In registration mode: go straight to registration form
            setPendingReg({ email: "", pwd: "", role: "student" });
            setRegMode(false);
            setError("");
          } else if(regMode && selectedRole === "lecturer") {
            setPendingReg({ email: "", pwd: "", role: "lecturer" });
            setRegMode(false);
            setError("");
          } else {

        }} disabled={loading} style={{ marginBottom:18, background: regMode ? "#0ea5e9" : "#2563eb" }}>
          {loading ? <><Spinner /> Signing in…</> : regMode ? <><i className="fa fa-user-plus"></i> Continue to Register</> : "Sign In →"}
        </Btn>

        {/* New student/lecturer self-registration */}
        {(selectedRole === "student" || selectedRole === "lecturer") && (
          !regMode ? (
            <div style={{ background: selectedRole==="lecturer" ? "rgba(139,92,246,.07)" : "rgba(14,165,233,.07)", border:`1px solid ${selectedRole==="lecturer"?"rgba(139,92,246,.2)":"rgba(14,165,233,.2)"}`, borderRadius:8, padding:"10px 14px", fontSize:12, color:"var(--tx2)", marginBottom:16, lineHeight:1.6, display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
              <span>

                <strong style={{color:"var(--tx)"}}>New {selectedRole}?</strong> Create your account in seconds.
              </span>
              <button onClick={startRegister}
                style={{ flexShrink:0, background: selectedRole==="lecturer"?"#8b5cf6":"#0ea5e9", color:"#fff", border:"none", borderRadius:7, padding:"5px 12px", fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>
                Register →
              </button>
            </div>
          ) : (
            <div style={{ marginBottom:16 }}>
              <div style={{ background: selectedRole==="lecturer"?"rgba(139,92,246,.07)":"rgba(14,165,233,.07)", border:`1px solid ${selectedRole==="lecturer"?"rgba(139,92,246,.2)":"rgba(14,165,233,.2)"}`, borderRadius:8, padding:"10px 14px", fontSize:12, color: selectedRole==="lecturer"?"#8b5cf6":"#0ea5e9", marginBottom:12, lineHeight:1.6 }}>
                <i className="fa fa-info-circle" style={{marginRight:6}}></i>Click <strong>Sign In</strong> with any email — you'll be guided to register. Your university email and password will be generated automatically.
              </div>
              <button onClick={() => { setRegMode(false); setEmail(""); setPwd(""); setError(""); }}
                style={{ background:"none", border:"none", color:"var(--tx3)", fontSize:12, cursor:"pointer", textDecoration:"underline" }}>
                ← Back to login
              </button>

          )
        )}

      </div>
    </div>
  );
};

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user,          setUser]          = useState(null); // always start at login
  const [page,          setPage]          = useState("dashboard");
  const [history,       setHistory]       = useState([]);
  const [students,      setStudents]      = useState(()=>dedupStudents(lsGet("dai_s",makeStudents())));
  const [users,         setUsers]         = useState(()=>dedupUsers(lsGet("dai_us",[...USERS_DB])));
  const [predHist,      setPredHist]      = useState(()=>lsGet("dai_p",[]));
  const [dark,          setDark]          = useState(()=>lsGet("dai_dk",false));
  const [interventions, setInterventions] = useState(()=>lsGet("dai_iv",[]));
  const [globalSearch,  setGlobalSearch]  = useState("");
  const [auditLog,      setAuditLog]      = useState(()=>lsGet("dai_al",[]));
  const addAudit = useCallback((entry) => {
    setAuditLog(prev => {
      const next = [{ ...entry, ts: new Date().toISOString() }, ...prev].slice(0,500);
      lsSet("dai_al", next);
      return next;
    });
  }, []);
  const [depts,         setDepts]         = useState(()=>lsGet("dai_d",[...DEPTS]));
  const [settings,      setSettings]      = useState(()=>lsGet("dai_cfg", {...DEFAULT_SETTINGS, algorithm:"Logistic Regression", featureSet:"Attendance, GPA, Financial, Study Hours"}));

  // Apply threshold on load
  React.useEffect(()=>{ THRESHOLD_REF.value = (settings.riskThreshold||50)/100; },[settings.riskThreshold]);

  const updateSettings = (updates) => {
    setSettings(prev => { const n={...prev,...updates}; lsSet("dai_cfg",n); return n; });
  };

  // Persist on every change
  useEffect(()=>lsSet("dai_u",user),[user]);
  useEffect(()=>lsSet("dai_s",students),[students]);
  useEffect(()=>lsSet("dai_us",users),[users]);
  useEffect(()=>lsSet("dai_p",predHist),[predHist]);
  useEffect(()=>lsSet("dai_dk",dark),[dark]);
  useEffect(()=>lsSet("dai_iv",interventions),[interventions]);
  useEffect(()=>lsSet("dai_d",depts),[depts]);
  useEffect(()=>lsSet("dai_cfg",settings),[settings]);

  // ── Live sync: reload students+users when localStorage changes (other tabs/sessions) ──
  useEffect(() => {
    const sync = () => {
      try {
        const s = localStorage.getItem("dai_s");
        const u = localStorage.getItem("dai_us");
        if(s) setStudents(dedupStudents(JSON.parse(s)));
        if(u) setUsers(dedupUsers(JSON.parse(u)));
      } catch {}
    };
    // Fire when another tab writes to localStorage
    window.addEventListener("storage", sync);
    // Also sync when admin comes back to the tab
    window.addEventListener("focus", sync);
    // Poll every 5 seconds as fallback (same tab, different session)
    const interval = setInterval(sync, 5000);
    return () => {
      window.removeEventListener("storage", sync);
      window.removeEventListener("focus", sync);
      clearInterval(interval);
    };
  }, []);

  // Apply dark/light class to <html>
  useEffect(() => {
    document.documentElement.classList.toggle("light", !dark);
    if (dark) {
      document.documentElement.style.setProperty("--tx",  "#ffffff");
      document.documentElement.style.setProperty("--tx2", "#c8d8f0");
      document.documentElement.style.setProperty("--tx3", "#7baad8");
    } else {
      document.documentElement.style.removeProperty("--tx");
      document.documentElement.style.removeProperty("--tx2");
      document.documentElement.style.removeProperty("--tx3");
    }
  }, [dark]);

  const toggleTheme = useCallback(() => setDark(d => !d), []);

  const addPred = useCallback(entry => {
    setPredHist(prev => {
      const next = [entry, ...prev];
      lsSet("dai_p", next);
      return next;
    });
  }, []);

  const addIntervention = useCallback(entry => {
    setInterventions(prev => {
      const next = [{ ...entry, id: Date.now() }, ...prev];
      lsSet("dai_iv", next);
      return next;
    });
    addAudit({ action:`Intervention logged: "${entry.type}"`, target:entry.student?.name || entry.studentName || "Student", by:entry.by || "Unknown" });
  }, [addAudit]);

  const logout = useCallback(() => {
    addAudit({ action:"Logout", target:user?.name, by:user?.name });
    lsSet("dai_u",null); setUser(null); setPage("dashboard"); setHistory([]);
  }, [user, addAudit]);

  // Apply primary color CSS var based on role
  useEffect(() => {
    if(!user) return;
    const theme = ROLE_THEMES[user.role];
    document.documentElement.style.setProperty("--primary", theme.primary);
    document.documentElement.style.setProperty("--primary-glow", theme.glow);
  }, [user]);

  const updateUser = useCallback((updates) => {
    setUser(prev => ({ ...prev, ...updates }));
    setUsers(prev => prev.map(u => u.id === user?.id ? { ...u, ...updates } : u));
  }, [user]);

  const authVal = useMemo(() => ({ user, logout, updateUser }), [user, logout, updateUser]);
  const themeVal = useMemo(() => ({ dark, toggle: toggleTheme }), [dark, toggleTheme]);

  // ── Sidebar collapse state ────────────────────────────────────────────────
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const toggleSidebar = useCallback(() => setSidebarCollapsed(v => !v), []);
  useEffect(() => {
    const w = sidebarCollapsed ? "var(--sidebar-collapsed-w)" : "var(--sidebar-w)";
    document.documentElement.style.setProperty("--active-sidebar-w", w);
  }, [sidebarCollapsed]);

  // ── Alerts state ─────────────────────────────────────────────────────────
  const [readSet,    setReadSet]    = useState(new Set()); // set of alert ids that have been read
  const [alertView,  setAlertView]  = useState(null);      // { id, icon, color, title, students[] }

  const buildAlerts = useCallback((usr, studs, ivs, preds, settings, studs2=[]) => {
    if(!usr) return [];

    // ── Student notifications ──
    if(usr.role === "student") {
      const list = [];
      const myPreds = preds.filter(p => p.studentId === usr.studentId);
      if(myPreds.length > 0) {
        const latest = myPreds[0];
        const isRisk = latest.res.prediction === 1;
        list.push({
          id: `pred-${latest.ts}`,
          icon: <i className={`fa fa-${isRisk?"exclamation-triangle":"check-circle"}`} style={{color: isRisk?"#ef4444":"#10b981"}}></i>,
          color: isRisk ? "#ef4444" : "#10b981",
          title: `Prediction result: ${isRisk ? "At Risk" : "Safe"}`,
          body: `Risk score: ${(latest.res.risk*100).toFixed(1)}% · Run by ${latest.by}`,
          students: [], ts: latest.ts
        });
      }
      const myStudent = studs.find(s => s.id === usr.studentId);
      const myAttThr = settings?.attThreshold || 70;
      if(myStudent && myStudent.att > 0 && myStudent.att < myAttThr) {
        list.push({ id:"low-att", icon:<i className="fa fa-calendar" style={{color:"#f59e0b"}}></i>, color:"#f59e0b", title:"Low attendance warning", body:`Your attendance is ${myStudent.att}% — below the ${myAttThr}% threshold.`, students:[] });
      }
      if(myStudent && myStudent.gpa > 0 && myStudent.gpa < 2.0) {
        list.push({ id:"low-gpa", icon:<i className="fa fa-book" style={{color:"#ef4444"}}></i>, color:"#ef4444", title:"Low GPA alert", body:`Your GPA is ${myStudent.gpa.toFixed(2)} — below the 2.0 passing threshold.`, students:[] });
      }
      if(list.length === 0) {
        list.push({ id:"welcome", icon:<i className="fa fa-check-circle" style={{color:"#10b981"}}></i>, color:"#10b981", title:"Account active", body:"Welcome to DropoutAI! Your dashboard will update once your lecturer enters your data.", students:[] });
      }
      return list;
    }

    // ── Lecturer & Admin notifications ──
    const pool = usr.role === "lecturer" ? studs.filter(s => s.dept === usr.dept) : studs;
    const atRisk  = pool.filter(s => s.att > 0 && mlPredict(s.att,s.gpa,s.fin,s.study).prediction===1);
    const attThr  = settings?.attThreshold || 70;
    const lowAtt  = pool.filter(s => s.att > 0 && s.att < attThr);
    const lowGPA  = pool.filter(s => s.gpa > 0 && s.gpa < 2.0);
    const poorFin = pool.filter(s => s.fin === 2);
    const newStudents = pool.filter(s => s.att === 0 && s.gpa === 0 && s.study === 0);
    const noIntervention = pool.filter(s => s.att > 0 && mlPredict(s.att,s.gpa,s.fin,s.study).prediction===1 && !ivs.some(iv => iv.studentId === s.id));

    // Admin-only: new lecturers registered
    const allLecturers = studs2.filter(u => u.role === "lecturer");
    const newLecturers = allLecturers.filter(l => {
      if(!l.registeredAt) return false;
      const diff = Date.now() - new Date(l.registeredAt).getTime();
      return diff < 7 * 24 * 60 * 60 * 1000; // registered in last 7 days
    });

    const list = [];
    if(usr.role === "admin" && newLecturers.length > 0) list.push({ id:`new-lec-${newLecturers.length}`, icon:<i className="fa fa-graduation-cap" style={{color:"#8b5cf6"}}></i>, color:"#8b5cf6", title:`${newLecturers.length} new lecturer${newLecturers.length>1?"s":""} registered`, body:newLecturers.map(l=>`${l.name} (${l.dept})`).join(", "), students:[] });
    if(newStudents.length > 0) list.push({ id:`new-students-${newStudents.length}`, icon:<i className="fa fa-user-plus" style={{color:"#0ea5e9"}}></i>, color:"#0ea5e9", title:`${newStudents.length} new student${newStudents.length>1?"s":""} registered`, body:"Awaiting academic data entry — enter their records to enable predictions.", students:newStudents });
    if(atRisk.length)  list.push({ id:"risk",  icon:<i className="fa fa-exclamation-triangle" style={{color:"#ef4444"}}></i>, color:"#ef4444", title:`${atRisk.length} student${atRisk.length>1?"s":""} at risk of dropout`, body:"Flagged by dropout prediction model — immediate action recommended.", students:atRisk });
    if(noIntervention.length) list.push({ id:"no-iv", icon:<i className="fa fa-clipboard" style={{color:"#8b5cf6"}}></i>, color:"#8b5cf6", title:`${noIntervention.length} at-risk student${noIntervention.length>1?"s":""} with no intervention`, body:"Log interventions to support these students.", students:noIntervention });
    if(lowAtt.length)  list.push({ id:"att",   icon:<i className="fa fa-calendar" style={{color:"#f59e0b"}}></i>, color:"#f59e0b", title:`${lowAtt.length} student${lowAtt.length>1?"s":""} with attendance below ${attThr}%`, body:"Low attendance is the top dropout predictor.", students:lowAtt });
    if(lowGPA.length)  list.push({ id:"gpa",   icon:<i className="fa fa-book" style={{color:"#3b82f6"}}></i>, color:"#3b82f6", title:`${lowGPA.length} student${lowGPA.length>1?"s":""} with GPA below 2.0`, body:"Critically low academic performance.", students:lowGPA });
    if(poorFin.length) list.push({ id:"fin",   icon:<i className="fa fa-money" style={{color:"#8b5cf6"}}></i>, color:"#8b5cf6", title:`${poorFin.length} student${poorFin.length>1?"s":""} in poor financial status`, body:"Urgent financial aid referral recommended.", students:poorFin });
    if(list.length === 0) list.push({ id:"all-good", icon:<i className="fa fa-check-circle" style={{color:"#10b981"}}></i>, color:"#10b981", title:"All clear!", body:"No critical alerts at this time. Keep monitoring your students.", students:[] });
    return list;
  }, []);

  const alerts = useMemo(() => buildAlerts(user, students, interventions, predHist, settings, users), [buildAlerts, user, students, interventions, predHist, settings, users]);
  const unreadCount = useMemo(() => alerts.filter(a => !readSet.has(a.id)).length, [alerts, readSet]);

  // Reset readSet when alerts change (new alerts appear)
  const prevAlertIds = React.useRef(new Set());
  useEffect(() => {
    const currentIds = new Set(alerts.map(a => a.id));
    const brandNew = alerts.filter(a => !prevAlertIds.current.has(a.id));
    if(brandNew.length > 0) {
      setReadSet(prev => {
        const next = new Set(prev);
        brandNew.forEach(a => next.delete(a.id)); // mark new alerts as unread
        return next;
      });
    }
    prevAlertIds.current = currentIds;
  }, [alerts]);

  const markAlertRead = useCallback(id => setReadSet(s => new Set([...s, id])), []);
  const markAllRead   = useCallback(() => setReadSet(new Set(alerts.map(a=>a.id))), [alerts]);

  const handleAlertClick = useCallback(alert => {
    markAlertRead(alert.id);
    if(alert.students && alert.students.length > 0) setAlertView(alert);
  }, [markAlertRead]);

  // Navigate forward — push current page onto history stack first
  const goToPage = useCallback(p => {
    setPage(prev => {
      if(prev !== p) setHistory(h => [...h, prev]);
      return p;
    });
    window.scrollTo(0, 0);
  }, []);

  // Go back to the previous page in the stack
  const goBack = useCallback(() => {
    setHistory(h => {
      if(h.length === 0) return h;
      const prev = h[h.length - 1];
      setPage(prev);
      window.scrollTo(0, 0);
      return h.slice(0, -1);
    });
  }, []);

  if(!user) return (
    <ThemeCtx.Provider value={themeVal}>
      <style>{globalCSS}</style>
      {/* Floating theme toggle on login screen */}
      <button onClick={toggleTheme} title={dark?"Switch to Light Mode":"Switch to Dark Mode"}
        style={{ position:"fixed", top:16, right:16, zIndex:999, width:38, height:38, borderRadius:10,
          border:"1px solid var(--bdr)", background:"var(--sur)", cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
          boxShadow:"0 2px 12px rgba(0,0,0,0.3)", transition:"all .2s" }}>
        {dark ? <i className="fa fa-sun-o"></i> : <i className="fa fa-moon-o"></i>}
      </button>
      <LoginScreen
          onLogin={u => { setUser(u); setHistory([]); addAudit({ action:"Login", target:u.name, by:u.name }); }}
          users={users}
          onRegister={details => {
            const isLecturer = details.role === "lecturer";
            const sid = Date.now();

            const matchedLecturer = users.find(u => u.role === "lecturer" && u.dept === details.dept);
            const assignedLecturerId = matchedLecturer ? matchedLecturer.id : null;

            if(!isLecturer) {
              // Guard: reject if same name already registered as a student
              const nameTaken = students.some(s => s.name.trim().toLowerCase() === details.name.trim().toLowerCase());
              if(nameTaken) {
                // Don't silently duplicate — this case should not arise if email check passes,
                // but clean up the students array anyway and abort duplicate insertion
                console.warn("[DropoutAI] Duplicate student name blocked:", details.name);
                return;
              }
              // Use consistent ID — studentId links user to student record
              const studentId  = sid; // numeric ID shared by both records
              const studentSid = details.studentId || ("STU-" + String(sid).slice(-5)); // display SID

              const newStudent = {
                id:         studentId,
                sid:        studentSid,
                name:       details.name,
                dept:       details.dept,
                year:       details.year,
                att:        0,
                gpa:        0,
                fin:        1,
                study:      0,
                lecturerId: assignedLecturerId,
                prev:       { att:0, gpa:0, fin:1, study:0 },
              };

              const newUser = {
                id:           sid,
                email:        details.email,
                pwd:          details.pwd,   // DOB password — never overwrite
                role:         "student",
                name:         details.name,
                dept:         details.dept,
                year:         details.year,
                color:        "#0ea5e9",
                registeredAt: new Date().toISOString(),
                studentId:    studentId,     // numeric — matches newStudent.id
                sid:          studentSid,    // display SID
              };

              setStudents(prev => {
                const next = dedupStudents([...prev, newStudent]);
                lsSet("dai_s", next);   // save immediately
                return next;
              });
              setUsers(prev => {
                const next = dedupUsers([...prev, newUser]);
                lsSet("dai_us", next);  // save immediately
                return next;
              });
              lsSet("dai_u", newUser);  // save session immediately
              setUser(newUser);
              setHistory([]);
              addAudit({ action:"Student registered", target:details.name, by:details.name });

            } else {
              // Lecturer
              const newUser = {
                id:           sid,
                email:        details.email,
                pwd:          details.pwd,
                role:         "lecturer",
                name:         details.name,
                dept:         details.dept,
                color:        "#8b5cf6",
                registeredAt: new Date().toISOString(),
                studentId:    null,
              };
              setUsers(prev => {
                const next = dedupUsers([...prev, newUser]);
                lsSet("dai_us", next);  // save immediately
                return next;
              });
              setStudents(prev => {
                const next = prev.map(s =>
                  s.dept === details.dept && !s.lecturerId
                    ? { ...s, lecturerId: sid }
                    : s
                );
                lsSet("dai_s", next);
                return next;
              });
              lsSet("dai_u", newUser);
              setUser(newUser);
              setHistory([]);
              addAudit({ action:"Lecturer registered", target:details.name, by:details.name });
            }
          }}
        />
    </ThemeCtx.Provider>
  );

  const DashboardComponent = {
    student:  StudentDashboard,
    lecturer: LecturerDashboard,
    admin:    AdminDashboard,
  }[user.role] || AdminDashboard;

  const defaultPage = user.role === "student" ? "my-dashboard" : "dashboard";
  const activePage  = page || defaultPage;
  const canGoBack   = history.length > 0;

  return (
    <AuditCtx.Provider value={{ log:auditLog, addAudit }}>
    <SettingsCtx.Provider value={{ settings, updateSettings }}>
    <ThemeCtx.Provider value={themeVal}>
    <AuthCtx.Provider value={authVal}>
      <style>{globalCSS}</style>
      <div className="app-shell">
        <Navbar currentPage={activePage} setPage={goToPage} collapsed={sidebarCollapsed} onToggleCollapse={toggleSidebar} canGoBack={canGoBack} goBack={goBack} />
        <TopBar alerts={alerts} readSet={readSet} unreadCount={unreadCount} onAlertClick={handleAlertClick} onMarkAllRead={markAllRead} globalSearch={globalSearch} onGlobalSearch={(val) => { setGlobalSearch(val); if(val.trim()) goToPage("students"); }} />
        <main className="main-area" style={{ padding:"24px 24px 0", paddingTop:"calc(56px + 24px)", minHeight:"100vh", boxSizing:"border-box", display:"flex", flexDirection:"column" }}>
          <div style={{ maxWidth:1200, width:"100%", flex:1 }}>
          <DashboardComponent
            page={activePage}
            setPage={goToPage}
            students={students}
            setStudents={setStudents}
            users={users}
            setUsers={setUsers}
            predHistory={predHist}
            addPred={addPred}
            setPredHist={setPredHist}
            interventions={interventions}
            addIntervention={addIntervention}
            globalSearch={globalSearch}
            setGlobalSearch={setGlobalSearch}
            depts={Array.from(new Set([...depts, ...students.map(s=>s.dept), ...users.filter(u=>u.role==="lecturer").map(u=>u.dept)].filter(Boolean)))}
            setDepts={setDepts}
            settings={settings}
            auditLog={auditLog}
            addAudit={addAudit}
          />
          </div>
          <div style={{ margin:"0 -24px", width:"calc(100% + 48px)" }}>
            <PageFooter />
          </div>
        </main>
      </div>{/* end app-shell */}

      {/* ── Alert Detail Modal ── */}
      {alertView && (
        <div onClick={() => setAlertView(null)}
          style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.65)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:16, width:"100%", maxWidth:660, maxHeight:"80vh", display:"flex", flexDirection:"column", boxShadow:"0 24px 64px rgba(0,0,0,0.7)", animation:"fadeUp .2s ease" }}>
            {/* Header */}
            <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
              <div style={{ width:40, height:40, borderRadius:10, background:`${alertView.color}20`, border:`1px solid ${alertView.color}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{alertView.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:800, color:"var(--tx)" }}>{alertView.title}</div>
                <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{alertView.students.length} student{alertView.students.length!==1?"s":""} affected</div>
              </div>
              <button onClick={() => setAlertView(null)}
                style={{ width:32, height:32, borderRadius:8, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--tx2)", flexShrink:0 }}><i className="fa fa-times"></i></button>
            </div>
            {/* Student table */}
            <div style={{ overflowY:"auto", flex:1 }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                <thead>
                  <tr style={{ background:"var(--sur2)" }}>
                    {["#","Name","SID","Dept","Att %","GPA","Financial","Risk"].map(h => (
                      <th key={h} style={{ padding:"9px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".09em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap", position:"sticky", top:0, background:"var(--sur2)" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {alertView.students.map((s, i) => {
                    const pred = mlPredict(s.att, s.gpa, s.fin, s.study);
                    return (
                      <tr key={s.id} style={{ borderBottom:"1px solid var(--bdr)" }}
                        onMouseEnter={e => e.currentTarget.style.background="rgba(59,130,246,.05)"}
                        onMouseLeave={e => e.currentTarget.style.background=""}>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{i+1}</td>
                        <td style={{ padding:"10px 14px", fontWeight:700 }}>{s.name}</td>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{s.sid}</td>
                        <td style={{ padding:"10px 14px", fontSize:12, color:"var(--tx3)" }}>{s.dept}</td>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontWeight:700, color: s.att<70?"var(--red)":"var(--green)" }}>{s.att.toFixed(1)}%</td>
                        <td style={{ padding:"10px 14px", fontFamily:"var(--mono)", fontWeight:700, color: s.gpa<2?"var(--red)":s.gpa<2.5?"var(--amber)":"var(--green)" }}>{s.gpa.toFixed(2)}</td>
                        <td style={{ padding:"10px 14px" }}><FinBadge fin={s.fin} /></td>
                        <td style={{ padding:"10px 14px" }}><RiskBadge risk={pred.prediction} score={pred.risk} /></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* Footer */}
            <div style={{ padding:"12px 20px", borderTop:"1px solid var(--bdr)", display:"flex", justifyContent:"flex-end", flexShrink:0 }}>
              <button onClick={() => setAlertView(null)}
                style={{ padding:"8px 22px", borderRadius:8, border:"none", background:"var(--primary,#3b82f6)", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer" }}>
                Close
              </button>
            </div>
          </div>
        </div>
      )}

    </AuthCtx.Provider>
    </ThemeCtx.Provider>
    </SettingsCtx.Provider>
    </AuditCtx.Provider>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>


</body>
</html>
