// ─── EXPORT UTILITY ──────────────────────────────────────────────────────────
// Wraps every cell: escapes quotes, wraps in quotes so commas inside are safe.
// Prepends UTF-8 BOM so Excel opens it correctly without garbling characters.
const toCSVCell = (v) => {
  if(v == null) return '""';
  const s = String(v).replace(/"/g, '""');
  return `"${s}"`;
};
const downloadCSV = (filename, rows) => {
  if(!rows || rows.length === 0) return;
  const csvContent = rows.map(row => row.map(toCSVCell).join(",")).join("\n");
  // BOM makes Excel auto-detect UTF-8
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csvContent], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 200);
};

// ─── DEDUPLICATION UTILITIES ─────────────────────────────────────────────────
// Dedup students: keep the last record per unique id, then per unique sid,
// then per unique name (case-insensitive). Runs on load and every insertion.
const dedupStudents = (arr) => {
  const seenId   = new Map();
  const seenSid  = new Map();
  const seenName = new Map();
  // Process in order; later entries (more recent) win on id/sid collisions
  arr.forEach(s => {
    if(s.id  != null) seenId.set(String(s.id), s);
    if(s.sid)         seenSid.set(s.sid.trim().toUpperCase(), s);
  });
  // Build from seenId (primary key), then add any that only appear by sid
  const byId = Array.from(seenId.values());
  byId.forEach(s => {
    if(s.sid) seenName.set(s.name.trim().toLowerCase(), s);
  });
  // Return unique by id only — sid/name duplication rejected at insert time
  return byId;
};

// Check if a student already exists (by id, sid, or full name)
const studentExists = (existing, candidate) => {
  const name = (candidate.name || "").trim().toLowerCase();
  const sid  = (candidate.sid  || "").trim().toUpperCase();
  const id   = candidate.id != null ? String(candidate.id) : null;
  return existing.some(s =>
    (id   && String(s.id) === id)   ||
    (sid  && s.sid  && s.sid.trim().toUpperCase()  === sid)  ||
    (name && s.name && s.name.trim().toLowerCase() === name)
  );
};

// Dedup users: unique by id and email
const dedupUsers = (arr) => {
  const seenId    = new Map();
  const seenEmail = new Map();
  arr.forEach(u => {
    if(u.id    != null) seenId.set(String(u.id), u);
    if(u.email)         seenEmail.set(u.email.toLowerCase().trim(), u);
  });
  return Array.from(seenId.values());
};

// Check if a user already exists (by id or email)
const userExists = (existing, candidate) => {
  const email = (candidate.email || "").toLowerCase().trim();
  const id    = candidate.id != null ? String(candidate.id) : null;
  return existing.some(u =>
    (id    && String(u.id) === id) ||
    (email && u.email && u.email.toLowerCase().trim() === email)
  );
};

// ─── ML MODEL ─────────────────────────────────────────────────────────────────
const ML = {
  coef: [-0.0523, -0.9821, 0.6134, -0.0812],
  intercept: 1.247,
  mean: [74.82, 2.89, 1.01, 3.42],

};
const sigmoid = x => 1 / (1 + Math.exp(-x));
// Mutable threshold ref — updated by SettingsPage
const THRESHOLD_REF = { value: 0.5 };

// ── Logistic Regression trainer (gradient descent) ────────────────────────────
function trainLogisticRegression(samples) {
  // samples: [{ features:[att,gpa,fin,study], label:0|1 }]
  if(samples.length < 5) return null;

  const n = samples.length;
  const nf = 4;

  // Compute mean and std for standardisation
  const mean = Array(nf).fill(0);
  const std  = Array(nf).fill(0);
  samples.forEach(s => s.features.forEach((v,i) => mean[i] += v));
  mean.forEach((_, i) => mean[i] /= n);
  samples.forEach(s => s.features.forEach((v,i) => std[i] += (v-mean[i])**2));
  std.forEach((_, i) => std[i] = Math.sqrt(std[i]/n) || 1);

  // Standardise features
  const X = samples.map(s => s.features.map((v,i) => (v-mean[i])/std[i]));
  const y = samples.map(s => s.label);

  // Gradient descent
  let w = Array(nf).fill(0);
  let b = 0;
  const lr = 0.1;
  const epochs = 1000;

  for(let e = 0; e < epochs; e++) {
    let dw = Array(nf).fill(0);
    let db = 0;
    for(let i = 0; i < n; i++) {
      const z = X[i].reduce((s,v,j) => s + v*w[j], b);
      const p = sigmoid(z);
      const err = p - y[i];
      X[i].forEach((v,j) => dw[j] += err * v);
      db += err;
    }
    w = w.map((v,j) => v - lr * dw[j] / n);
    b = b - lr * db / n;
  }

  // Compute train accuracy
  let correct = 0;
  for(let i = 0; i < n; i++) {
    const z = X[i].reduce((s,v,j) => s + v*w[j], b);
    const pred = sigmoid(z) >= THRESHOLD_REF.value ? 1 : 0;
    if(pred === y[i]) correct++;
  }
  const trainAcc = (correct / n * 100);

  return { coef:w, intercept:b, mean, std, trainAcc, trainSize:n };
}

function mlPredict(att, gpa, fin, study) {
  const f = [att, gpa, fin, study];
  const s = f.map((v, i) => (v - ML.mean[i]) / ML.std[i]);
  let z = ML.intercept;
  s.forEach((v, i) => { z += ML.coef[i] * v; });
  const p = sigmoid(z);
  return { risk: p, prediction: p >= THRESHOLD_REF.value ? 1 : 0, confidence: Math.max(p, 1 - p) };
}
function mlImpacts(att, gpa, fin, study) {
  const f = [att, gpa, fin, study];
  const raw = f.map((v, i) => Math.abs(ML.coef[i] * ((v - ML.mean[i]) / ML.std[i])));
  const total = raw.reduce((a, b) => a + b, 0) || 1;
  return raw.map(v => v / total);
}

// ─── GAUGE ────────────────────────────────────────────────────────────────────
const RiskGauge = ({ score, isRisk }) => {
  const pct = (score * 100).toFixed(1);
  const fillColor = isRisk ? "#ef4444" : "#10b981";
  return (
    <div style={{ margin:"14px 0" }}>
      <div style={{ ...S.flex(0,"center","space-between"), fontSize:12, color:"var(--tx3)", marginBottom:6 }}>

        <span>High Risk</span>
      </div>
      <div style={{ height:10, background:"rgba(255,255,255,.05)", borderRadius:5, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:fillColor, borderRadius:5, transition:"width 1.2s cubic-bezier(.34,1.56,.64,1)" }} />

// ─── MINI BAR CHART ───────────────────────────────────────────────────────────
const MiniBar = ({ data, color="#3b82f6" }) => {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div style={{ ...S.flex(8,"flex-end") }}>
      {data.map((d, i) => (

// ─── DONUT ────────────────────────────────────────────────────────────────────
const Donut = ({ value, total, color="#ef4444", label, onClick }) => {
  const pct = total > 0 ? (value / total) * 100 : 0;
  const r = 36, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <div onClick={onClick}
      style={{ textAlign:"center", cursor:onClick?"pointer":"default", padding:"8px 12px", borderRadius:12, transition:"all .2s", border:"1px solid transparent" }}
      onMouseEnter={e=>{ if(onClick){ e.currentTarget.style.background=`${color}12`; e.currentTarget.style.borderColor=`${color}40`; e.currentTarget.style.transform="translateY(-3px)"; }}}
      onMouseLeave={e=>{ if(onClick){ e.currentTarget.style.background=""; e.currentTarget.style.borderColor="transparent"; e.currentTarget.style.transform=""; }}}>
      <svg width={100} height={100} viewBox="0 0 100 100" style={{ transform:"rotate(-90deg)" }}>
        <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={10} strokeOpacity={0.15} />
        <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={10}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{ transition:"stroke-dasharray .8s ease" }} />
      </svg>
      <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:700, color, marginTop:-4 }}>{pct.toFixed(0)}%</div>
      <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{label}</div>
      <div style={{ fontSize:10, fontWeight:700, color, marginTop:2 }}>{value} students</div>
      {onClick && <div style={{ fontSize:9, color:"var(--tx3)", marginTop:2 }}>Click to filter ↓</div>}
    </div>
  );
};

// ─── PREDICTION RESULT CARD ───────────────────────────────────────────────────
const PredictionResultCard = ({ result, student, showDetails=true }) => {
  const { risk, prediction, confidence } = result;
  const isRisk = prediction === 1;
  const impacts = mlImpacts(student.att, student.gpa, student.fin, student.study);
  const names = ["Attendance","GPA","Financial","Study Hrs"];
  const colors = ["#0ea5e9","#14b8a6","#f59e0b","#10b981"];
  const recs = buildRecs(isRisk, student);

  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      <div style={{ background: isRisk ? "rgba(239,68,68,.08)" : "rgba(16,185,129,.08)", border:`1px solid ${isRisk?"rgba(239,68,68,.25)":"rgba(16,185,129,.25)"}`, borderRadius:12, padding:20, marginBottom:14 }}>
        <div style={{ fontSize:36, marginBottom:8 }}>{isRisk ? <i className="fa fa-exclamation-triangle" style={{color:"var(--red)",fontSize:36}}></i> : <i className="fa fa-check-circle" style={{color:"var(--green)",fontSize:36}}></i>}</div>
        <div style={{ fontSize:11, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:"var(--mono)", marginBottom:4 }}>Prediction Result</div>
        <div style={{ fontSize:22, fontWeight:800, color: isRisk ? "var(--red)" : "var(--green)" }}>{isRisk ? "At Risk of Dropout" : "Not at Risk"}</div>
      </div>

      <RiskGauge score={risk} isRisk={isRisk} />

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
        {[
          { l:"Risk Score",  v:`${(risk*100).toFixed(1)}%`, c: isRisk?"var(--red)":"var(--green)" },
          { l:"Confidence",  v:`${(confidence*100).toFixed(1)}%`, c:"var(--blue)" },
          { l:"Model Acc.",  v:"82.5%", c:"var(--amber)" },
        ].map((m,i) => (
          <div key={i} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:9, padding:10, textAlign:"center" }}>
            <div style={{ fontFamily:"var(--mono)", fontSize:17, fontWeight:700, color:m.c }}>{m.v}</div>
            <div style={{ fontSize:10, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.08em", marginTop:3 }}>{m.l}</div>
          </div>
        ))}
      </div>

      {showDetails && <>
        <div style={{ ...S.card2(14), marginBottom:12 }}>
          <div style={{ ...S.label, marginBottom:10 }}>Factor Influence</div>
          {names.map((n,i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:9 }}>
              <div style={{ fontSize:11, color:"var(--tx3)", width:80, textAlign:"right", flexShrink:0 }}>{n}</div>
              <div style={{ flex:1, height:5, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${(impacts[i]*100).toFixed(0)}%`, background:colors[i], borderRadius:3, transition:"width .8s ease" }} />
              </div>
              <div style={{ fontFamily:"var(--mono)", fontSize:10, width:28, textAlign:"right", color:"var(--tx2)" }}>{(impacts[i]*100).toFixed(0)}%</div>
            </div>
          ))}
        </div>

        <div style={S.card2(14)}>
          <div style={{ ...S.label, marginBottom:10 }}>Recommendations</div>
          {recs.map((r,i) => (
            <div key={i} style={{ display:"flex", gap:8, fontSize:12, lineHeight:1.6, color:"var(--tx2)", marginBottom:8, padding:"8px 10px", background:"rgba(255,255,255,.03)", borderRadius:7, border:"1px solid var(--bdr)" }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background: isRisk?"var(--red)":"var(--green)", flexShrink:0, marginTop:5 }} />
              {r}
            </div>
          ))}
        </div>
      </>}
    </div>
  );
};

function buildRecs(isRisk, s) {
  const r = [];
  if(s.att < 70) r.push("Attendance below 70% — flag for mandatory advisor check-in.");
  if(s.gpa < 2.2) r.push("GPA critically low — enrol in academic support programme.");
  if(s.fin === 2) r.push("Severe financial hardship — urgent referral to financial aid office.");
  if(s.fin === 1) r.push("Moderate financial strain — explore scholarship opportunities.");
  if(s.study < 1.5) r.push("Very few study hours — refer to study skills workshop.");
  if(!isRisk) {
    r.push("Student shows positive indicators. Maintain routine check-ins.");
    if(s.att >= 85) r.push("Excellent attendance — strong predictor of retention.");
    if(s.gpa >= 3.0) r.push("Strong GPA — performing well above the critical threshold.");
  }
  if(!r.length) r.push("Multiple borderline factors present — schedule academic counselling.");
  return r;
}

// ─── AUDIT LOG CONTEXT ───────────────────────────────────────────────────────
const AuditCtx = createContext({ log:[], addAudit:()=>{} });

// ─── SHARED TYPES ───────────────────────────────────────────────────────────
const INTERVENTION_TYPES = ["Counselling","Academic Support","Financial Aid Referral","Parent Contact","Study Plan","Warning Letter","Other"];

// ─── RECOMMENDED ACTIONS PANEL ───────────────────────────────────────────────
const ACTIONS_DB = [
  { id:"att1",  cond: s => s.att < 50,          priority:"critical", icon:"exclamation-triangle", color:"#ef4444", category:"Attendance",  title:"Emergency Attendance Review",     desc:"Attendance critically below 50%. Schedule immediate face-to-face meeting with academic advisor. Consider attendance contract." },
  { id:"att2",  cond: s => s.att >= 50 && s.att < 70, priority:"high",  icon:"times-circle",   color:"#f59e0b", category:"Attendance",  title:"Attendance Improvement Plan",     desc:"Attendance below 70% threshold. Issue formal warning and set up weekly attendance check-ins with personal tutor." },
  { id:"att3",  cond: s => s.att >= 70 && s.att < 80, priority:"medium",icon:"check-circle-o",   color:"#3b82f6", category:"Attendance",  title:"Monitor Attendance Trends",       desc:"Attendance borderline. Schedule a pastoral conversation to identify any barriers before they worsen." },
  { id:"gpa1",  cond: s => s.gpa < 1.5,          priority:"critical", icon:"book",               color:"#ef4444", category:"Academic",    title:"Academic Probation Review",       desc:"GPA below 1.5 — student may face academic exclusion. Refer immediately to Dean of Students and academic support unit." },
  { id:"gpa2",  cond: s => s.gpa >= 1.5 && s.gpa < 2.0, priority:"high", icon:"graduation-cap",  color:"#f59e0b", category:"Academic",    title:"Enrol in Tutoring Programme",     desc:"GPA below passing threshold (2.0). Enrol student in peer tutoring and weekly academic coaching sessions." },
  { id:"gpa3",  cond: s => s.gpa >= 2.0 && s.gpa < 2.5, priority:"medium",icon:"pencil",         color:"#3b82f6", category:"Academic",    title:"Academic Skills Workshop",        desc:"Borderline GPA. Recommend attendance at academic writing and exam preparation workshops offered by the learning centre." },
  { id:"fin1",  cond: s => s.fin === 2,           priority:"critical", icon:"money",              color:"#ef4444", category:"Financial",   title:"Urgent Financial Aid Referral",   desc:"Student in severe financial hardship. Refer immediately to financial aid office for emergency bursary or payment plan." },
  { id:"fin2",  cond: s => s.fin === 1,            priority:"medium",  icon:"credit-card",        color:"#f59e0b", category:"Financial",   title:"Scholarship & Bursary Guidance",  desc:"Moderate financial strain detected. Provide list of available scholarships, part-time work opportunities and financial counselling." },
  { id:"std1",  cond: s => s.study < 1.0,         priority:"high",    icon:"clock-o",            color:"#f59e0b", category:"Study Habits", title:"Study Skills Intervention",     desc:"Under 1 hour of study per day. Refer to study skills workshop and arrange structured study timetable with academic advisor." },
  { id:"std2",  cond: s => s.study >= 1.0 && s.study < 2.5, priority:"low", icon:"book",        color:"#3b82f6", category:"Study Habits", title:"Study Environment Assessment",  desc:"Low study hours. Explore access to library study spaces, quiet zones and online resources to improve study routine." },
  { id:"mul1",  cond: s => (s.att < 70 && s.gpa < 2.0), priority:"critical", icon:"exclamation-triangle",    color:"#ef4444", category:"Multi-Factor", title:"High-Risk Multi-Factor Case",   desc:"Both attendance and GPA are critically low simultaneously. Initiate full case review with Dean, student welfare and financial aid." },
  { id:"mul2",  cond: s => (s.fin === 2 && s.gpa < 2.0), priority:"critical", icon:"exclamation-triangle",   color:"#ef4444", category:"Multi-Factor", title:"Financial + Academic Crisis",   desc:"Severe financial hardship combined with low GPA. Coordinate cross-departmental support package: financial aid + academic coaching." },
];

const PRIORITY_ORDER = { critical:0, high:1, medium:2, low:3 };
const PRIORITY_LABELS = { critical:["Critical","#ef4444"], high:["High","#f59e0b"], medium:["Medium","#3b82f6"], low:["Low","#10b981"] };

const RecommendedActionsPanel = ({ student, interventions, addIntervention, userName }) => {
  const { addAudit } = useContext(AuditCtx);
  const [done, setDone] = useState(new Set());
  const [logFor, setLogFor] = useState(null);
  const [logNote, setLogNote] = useState("");
  const [logType, setLogType] = useState("Counselling");

  const pred = mlPredict(student.att, student.gpa, student.fin, student.study);
  const actions = ACTIONS_DB.filter(a => a.cond(student)).sort((a,b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
  const existingIvs = interventions.filter(iv => iv.studentId === student.id);

  const markDone = (actionId, actionTitle) => {
    setDone(prev => new Set([...prev, actionId]));
    if(addIntervention) {
      addIntervention({ studentId:student.id, student, type:"Academic Counselling", note:`Action completed: ${actionTitle}`, date:new Date().toISOString().split("T")[0], by:userName });
      addAudit?.({ action:`Action marked done: "${actionTitle}"`, target:student.name, by:userName });
    }
  };

  const logIntervention = () => {
    if(!logNote.trim()) return;
    addIntervention?.({ studentId:student.id, student, type:logType, note:logNote.trim(), date:new Date().toISOString().split("T")[0], by:userName });
    addAudit?.({ action:`Intervention logged: "${logType}"`, target:student.name, by:userName });
    setLogFor(null);
    setLogNote("");
  };

  if(actions.length === 0) return (
    <Card>
      <div style={{ textAlign:"center", padding:"28px 16px" }}>
        <div style={{ fontSize:36, marginBottom:10, color:"var(--green)" }}><i className="fa fa-check-circle"></i></div>
        <div style={{ fontSize:15, fontWeight:800, marginBottom:6, color:"var(--green)" }}>No Critical Actions Required</div>
        <div style={{ fontSize:12, color:"var(--tx3)" }}>This student's indicators are within acceptable ranges. Continue routine monitoring.</div>
      </div>
    </Card>
  );

  const criticalCount = actions.filter(a=>a.priority==="critical").length;
  const highCount = actions.filter(a=>a.priority==="high").length;

  return (
    <div style={S.col(16)}>
      {/* Header banner */}
      <div style={{ background: criticalCount > 0 ? "rgba(239,68,68,.07)" : "rgba(245,158,11,.07)", border:`1px solid ${criticalCount > 0 ? "rgba(239,68,68,.25)" : "rgba(245,158,11,.25)"}`, borderRadius:12, padding:"14px 18px", display:"flex", alignItems:"center", gap:14 }}>
        <div style={{ width:44, height:44, borderRadius:10, background: criticalCount > 0 ? "rgba(239,68,68,.15)" : "rgba(245,158,11,.15)", border:`1px solid ${criticalCount > 0 ? "rgba(239,68,68,.3)" : "rgba(245,158,11,.3)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color: criticalCount > 0 ? "var(--red)" : "var(--amber)", flexShrink:0 }}>
          <i className="fa fa-tasks"></i>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:800, marginBottom:3 }}>{actions.length} Recommended Action{actions.length!==1?"s":""} for {student.name.split(" ")[0]}</div>
          <div style={{ fontSize:12, color:"var(--tx3)" }}>
            {criticalCount > 0 && <span style={{ color:"var(--red)", fontWeight:700, marginRight:10 }}>⚠ {criticalCount} Critical</span>}
            {highCount > 0 && <span style={{ color:"var(--amber)", fontWeight:700, marginRight:10 }}>▲ {highCount} High Priority</span>}
            {existingIvs.length > 0 && <span style={{ color:"var(--green)" }}>✓ {existingIvs.length} intervention{existingIvs.length!==1?"s":""} already logged</span>}
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <span style={{ ...S.tag(pred.prediction===1?"#ef4444":"#10b981"), fontSize:11 }}>Risk: {(pred.risk*100).toFixed(0)}%</span>
        </div>
      </div>

      {/* Action cards */}
      <div style={S.col(10)}>
        {actions.map(action => {
          const isDone = done.has(action.id);
          const [prioLabel, prioColor] = PRIORITY_LABELS[action.priority];
          return (
            <div key={action.id} style={{ background:"var(--sur)", border:`1px solid ${isDone ? "rgba(16,185,129,.3)" : action.color+"33"}`, borderLeft:`4px solid ${isDone ? "#10b981" : action.color}`, borderRadius:12, padding:"14px 16px", opacity: isDone ? 0.6 : 1, transition:"all .2s" }}>
              <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
                <div style={{ width:36, height:36, borderRadius:9, background:`${isDone ? "#10b981" : action.color}18`, border:`1px solid ${isDone ? "#10b981" : action.color}30`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color: isDone ? "#10b981" : action.color, flexShrink:0 }}>
                  <i className={`fa fa-${isDone ? "check" : action.icon}`}></i>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5, flexWrap:"wrap" }}>
                    <span style={{ fontSize:13, fontWeight:800 }}>{action.title}</span>
                    <span style={{ ...S.tag(prioColor), fontSize:10 }}>{prioLabel}</span>
                    <span style={{ ...S.tag("#6b7280"), fontSize:10 }}>{action.category}</span>
                    {isDone && <span style={{ ...S.tag("#10b981"), fontSize:10 }}>Done</span>}
                  </div>
                  <div style={{ fontSize:12, color:"var(--tx2)", lineHeight:1.65 }}>{action.desc}</div>
                </div>
                {!isDone && (
                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <button onClick={() => { setLogFor(action); setLogNote(action.title); }}
                      style={{ padding:"5px 12px", borderRadius:7, border:"1px solid var(--bdr)", background:"var(--sur2)", color:"var(--tx2)", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                      <i className="fa fa-plus" style={{marginRight:5}}></i>Log
                    </button>
                    <button onClick={() => markDone(action.id, action.title)}
                      style={{ padding:"5px 12px", borderRadius:7, border:"1px solid rgba(16,185,129,.4)", background:"rgba(16,185,129,.08)", color:"var(--green)", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                      <i className="fa fa-check" style={{marginRight:5}}></i>Done
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Quick Log Modal */}
      {logFor && (
        <div onClick={() => setLogFor(null)} style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(3px)" }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, width:"100%", maxWidth:460, boxShadow:"0 20px 60px rgba(0,0,0,.6)", animation:"fadeUp .2s ease" }}>
            <div style={{ padding:"16px 20px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", gap:10 }}>
              <i className="fa fa-clipboard" style={{ fontSize:18, color:"var(--primary,#3b82f6)" }}></i>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:800 }}>Log Intervention</div>
                <div style={{ fontSize:12, color:"var(--tx3)" }}>For: {student.name} · {logFor.title}</div>
              </div>
              <button onClick={() => setLogFor(null)} style={{ width:28, height:28, borderRadius:7, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:13, color:"var(--tx2)" }}>✕</button>
            </div>
            <div style={{ padding:"16px 20px" }}>
              <FieldGroup label="Type">
                <select value={logType} onChange={e=>setLogType(e.target.value)}>
                  {INTERVENTION_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </FieldGroup>
              <FieldGroup label="Notes" required>
                <textarea value={logNote} onChange={e=>setLogNote(e.target.value)} style={{ minHeight:80 }} placeholder="Describe the intervention taken…" />
              </FieldGroup>
              <div style={S.flex(8)}>
                <Btn onClick={logIntervention} disabled={!logNote.trim()} style={{ background:"var(--primary,#3b82f6)" }}><i className="fa fa-floppy-o"></i> Save</Btn>
                <Btn variant="ghost" onClick={()=>setLogFor(null)}>Cancel</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── DEPT COMPARISON PAGE ─────────────────────────────────────────────────────
const DeptComparisonPage = ({ students=[], users=[], depts=[] }) => {
  const [sortBy, setSortBy] = useState("risk"); // "risk"|"students"|"gpa"|"att"
  const [view, setView] = useState("bar"); // "bar"|"table"

  const allDepts = Array.from(new Set([
    ...depts,
    ...students.map(s=>s.dept),
    ...users.filter(u=>u.role==="lecturer").map(u=>u.dept)
  ].filter(Boolean)));

  const deptData = allDepts.map(dept => {
    const studs = students.filter(s => s.dept === dept);
    const withData = studs.filter(s => s.att > 0 || s.gpa > 0);
    const atRisk = withData.filter(s => mlPredict(s.att,s.gpa,s.fin,s.study).prediction===1);
    const lecturers = users.filter(u => u.role==="lecturer" && u.dept===dept);
    const avgGPA = withData.length ? (withData.reduce((a,s)=>a+s.gpa,0)/withData.length) : 0;
    const avgAtt = withData.length ? (withData.reduce((a,s)=>a+s.att,0)/withData.length) : 0;
    const poorFin = studs.filter(s=>s.fin===2).length;
    const riskRate = withData.length ? (atRisk.length/withData.length*100) : 0;
    return { dept, studs:studs.length, withData:withData.length, atRisk:atRisk.length, lecturers:lecturers.length, avgGPA, avgAtt, poorFin, riskRate };
  });

  const sorted = [...deptData].sort((a,b) => {
    if(sortBy==="risk")     return b.riskRate - a.riskRate;
    if(sortBy==="students") return b.studs - a.studs;
    if(sortBy==="gpa")      return b.avgGPA - a.avgGPA;
    if(sortBy==="att")      return b.avgAtt - a.avgAtt;
    return 0;
  });

  const maxRisk = Math.max(...deptData.map(d=>d.riskRate), 1);
  const maxStudents = Math.max(...deptData.map(d=>d.studs), 1);

  const tabBtn = (v, label) => (
    <button onClick={()=>setSortBy(v)} style={{ padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", border:"none", background:sortBy===v?"var(--primary,#f59e0b)":  "var(--sur2)", color:sortBy===v?"#000":"var(--tx2)", transition:"all .15s" }}>{label}</button>
  );

  return (
    <div style={S.col(20)}>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-bar-chart" style={{fontSize:18,marginRight:8}}></i>Department Comparison</h2>
            <p style={S.sub}>Side-by-side comparison of all departments across key dropout indicators.</p>
          </div>
          <div style={S.flex(6)}>
            <button onClick={()=>setView("bar")} style={{ padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", border:"none", background:view==="bar"?"var(--primary,#f59e0b)":"var(--sur2)", color:view==="bar"?"#000":"var(--tx2)", transition:"all .15s" }}><i className="fa fa-bar-chart" style={{marginRight:5}}></i>Chart</button>
            <button onClick={()=>setView("table")} style={{ padding:"7px 16px", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", border:"none", background:view==="table"?"var(--primary,#f59e0b)":"var(--sur2)", color:view==="table"?"#000":"var(--tx2)", transition:"all .15s" }}><i className="fa fa-table" style={{marginRight:5}}></i>Table</button>
          </div>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Sort controls */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <span style={{ fontSize:12, color:"var(--tx3)", alignSelf:"center", marginRight:4 }}>Sort by:</span>
        {tabBtn("risk","Risk Rate")}
        {tabBtn("students","Student Count")}
        {tabBtn("gpa","Avg GPA")}
        {tabBtn("att","Avg Attendance")}
      </div>

      {/* Summary KPIs */}
      <div style={S.grid("repeat(4,1fr)",14)}>
        {[
          ["Departments",  allDepts.length,   "#f59e0b", "building"],
          ["Total Students", students.length,  "#3b82f6", "users"],
          ["Overall At-Risk", `${students.filter(s=>s.att>0&&mlPredict(s.att,s.gpa,s.fin,s.study).prediction===1).length}`, "#ef4444","exclamation-triangle"],
          ["Avg Risk Rate",  `${(deptData.reduce((a,d)=>a+d.riskRate,0)/Math.max(deptData.length,1)).toFixed(1)}%`, "#8b5cf6","pie-chart"],
        ].map(([label,value,color,icon])=>(
          <div key={label} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:`4px solid ${color}`, borderRadius:12, padding:16 }}>
            <div style={{ width:36, height:36, borderRadius:8, background:`${color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color, marginBottom:10 }}><i className={`fa fa-${icon}`}></i></div>
            <div style={S.label}>{label}</div>
            <div style={{ fontFamily:"var(--mono)", fontSize:24, fontWeight:700, color, marginTop:6 }}>{value}</div>
          </div>
        ))}
      </div>

      {/* BAR CHART VIEW */}
      {view === "bar" && (
        <div style={S.col(12)}>
          <Card>
            <CardHeader title="Dropout Risk Rate by Department (%)" action={<span style={{ fontSize:11, color:"var(--tx3)" }}>Higher = more at-risk students</span>} />
            <div style={S.col(10)}>
              {sorted.map(d => {
                const pct = maxRisk > 0 ? (d.riskRate/maxRisk*100) : 0;
                const color = d.riskRate >= 50 ? "#ef4444" : d.riskRate >= 25 ? "#f59e0b" : "#10b981";
                return (
                  <div key={d.dept} style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:160, fontSize:12, color:"var(--tx2)", flexShrink:0, textAlign:"right", fontWeight:600 }}>{d.dept.length > 20 ? d.dept.slice(0,18)+"…" : d.dept}</div>
                    <div style={{ flex:1, height:28, background:"rgba(255,255,255,.04)", borderRadius:7, overflow:"hidden", position:"relative" }}>
                      <div style={{ height:"100%", width:`${pct}%`, background:color, borderRadius:7, transition:"width .8s ease", minWidth:d.riskRate>0?8:0 }} />
                      <div style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:11, fontWeight:700, color:pct>30?"#fff":"var(--tx2)" }}>{d.riskRate.toFixed(1)}% ({d.atRisk}/{d.withData})</div>
                    </div>
                    <span style={{ ...S.tag(color), fontSize:10, flexShrink:0 }}>{d.riskRate >= 50 ? "HIGH" : d.riskRate >= 25 ? "MED" : "LOW"}</span>
                  </div>
                );
              })}
            </div>
          </Card>

          <div style={S.grid("1fr 1fr",16)}>
            <Card>
              <CardHeader title="Student Count by Department" />
              <div style={S.col(8)}>
                {[...deptData].sort((a,b)=>b.studs-a.studs).map(d => (
                  <div key={d.dept} style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:130, fontSize:11, color:"var(--tx3)", flexShrink:0, textAlign:"right" }}>{d.dept.slice(0,16)}{d.dept.length>16?"…":""}</div>
                    <div style={{ flex:1, height:20, background:"rgba(255,255,255,.04)", borderRadius:5, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${d.studs/maxStudents*100}%`, background:"#3b82f6", borderRadius:5, transition:"width .6s ease" }} />
                    </div>
                    <span style={{ fontFamily:"var(--mono)", fontSize:11, width:24, textAlign:"right", color:"#3b82f6", fontWeight:700 }}>{d.studs}</span>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <CardHeader title="Avg GPA by Department" />
              <div style={S.col(8)}>
                {[...deptData].sort((a,b)=>b.avgGPA-a.avgGPA).map(d => {
                  const gpaColor = d.avgGPA < 2.0 ? "#ef4444" : d.avgGPA < 2.5 ? "#f59e0b" : "#10b981";
                  return (
                    <div key={d.dept} style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:130, fontSize:11, color:"var(--tx3)", flexShrink:0, textAlign:"right" }}>{d.dept.slice(0,16)}{d.dept.length>16?"…":""}</div>
                      <div style={{ flex:1, height:20, background:"rgba(255,255,255,.04)", borderRadius:5, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:`${d.avgGPA/4.0*100}%`, background:gpaColor, borderRadius:5, transition:"width .6s ease" }} />
                      </div>
                      <span style={{ fontFamily:"var(--mono)", fontSize:11, width:36, textAlign:"right", color:gpaColor, fontWeight:700 }}>{d.avgGPA.toFixed(2)}</span>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>
        </div>
      )}

      {/* TABLE VIEW */}
      {view === "table" && (
        <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"var(--sur2)" }}>
                {["Department","Students","Lecturers","At Risk","Risk Rate","Avg GPA","Avg Att %","Poor Fin.","Status"].map(h=>(
                  <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:"var(--tx3)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map(d => {
                const riskColor = d.riskRate>=50?"var(--red)":d.riskRate>=25?"var(--amber)":"var(--green)";
                const statusLabel = d.riskRate>=50?"High Risk":d.riskRate>=25?"Moderate":"Healthy";
                return (
                  <tr key={d.dept} style={{ borderBottom:"1px solid var(--bdr)" }}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(59,130,246,.04)"}
                    onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <td style={{ padding:"12px 14px", fontWeight:700 }}>{d.dept}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"#3b82f6", fontWeight:700 }}>{d.studs}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"#8b5cf6" }}>{d.lecturers}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"var(--red)", fontWeight:700 }}>{d.atRisk}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:riskColor, fontWeight:800 }}>{d.riskRate.toFixed(1)}%</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color: d.avgGPA<2?"var(--red)":d.avgGPA<2.5?"var(--amber)":"var(--green)" }}>{d.avgGPA.toFixed(2)}</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color: d.avgAtt<70?"var(--red)":"var(--green)" }}>{d.avgAtt.toFixed(1)}%</td>
                    <td style={{ padding:"12px 14px", fontFamily:"var(--mono)", color:"var(--red)" }}>{d.poorFin}</td>
                    <td style={{ padding:"12px 14px" }}><span style={{ ...S.tag(d.riskRate>=50?"#ef4444":d.riskRate>=25?"#f59e0b":"#10b981"), fontSize:10 }}>{statusLabel}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

// ─── AUDIT LOG PAGE ───────────────────────────────────────────────────────────
const AuditLogPage = ({ auditLog=[] }) => {
  const [search, setSearch] = useState("");
  const [filterBy, setFilterBy] = useState(""); // action category filter

  const filtered = auditLog.filter(e => {
    const q = search.toLowerCase();
    return !q || e.action.toLowerCase().includes(q) || (e.target||"").toLowerCase().includes(q) || (e.by||"").toLowerCase().includes(q);
  });

  const categories = Array.from(new Set(auditLog.map(e => {
    if(e.action.includes("Login")) return "Login";
    if(e.action.includes("Logout")) return "Logout";
    if(e.action.includes("Prediction") || e.action.includes("prediction")) return "Prediction";
    if(e.action.includes("Intervention") || e.action.includes("intervention")) return "Intervention";
    if(e.action.includes("Student") || e.action.includes("student")) return "Student";
    if(e.action.includes("Action")) return "Action";
    return "System";
  })));

  const getIcon = (action) => {
    if(action.includes("Login")) return { icon:"sign-in", color:"#10b981" };
    if(action.includes("Logout")) return { icon:"sign-out", color:"#6b7280" };
    if(action.includes("Prediction") || action.includes("prediction")) return { icon:"magic", color:"#8b5cf6" };
    if(action.includes("Intervention") || action.includes("intervention")) return { icon:"clipboard", color:"#3b82f6" };
    if(action.includes("Student") || action.includes("student")) return { icon:"user", color:"#0ea5e9" };
    if(action.includes("Action")) return { icon:"check-circle", color:"#10b981" };
    return { icon:"cog", color:"#f59e0b" };
  };

  return (
    <div style={S.col(20)}>
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-history" style={{fontSize:18,marginRight:8}}></i>Audit Log</h2>
            <p style={S.sub}>Complete record of all system actions — predictions, logins, interventions and changes.</p>
          </div>
          <div style={S.flex(8)}>
            <span style={{ fontSize:12, color:"var(--tx3)" }}>{auditLog.length} total events</span>
          </div>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Summary tiles */}
      {auditLog.length > 0 && (
        <div style={S.grid("repeat(4,1fr)",14)}>
          {[
            ["Total Events",    auditLog.length,                                        "#f59e0b","history"],
            ["Predictions",     auditLog.filter(e=>e.action.toLowerCase().includes("predict")).length, "#8b5cf6","magic"],
            ["Interventions",   auditLog.filter(e=>e.action.toLowerCase().includes("intervention")).length,"#3b82f6","clipboard"],
            ["Logins",          auditLog.filter(e=>e.action.includes("Login")).length,  "#10b981","sign-in"],
          ].map(([label,value,color,icon])=>(
            <div key={label} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:`4px solid ${color}`, borderRadius:12, padding:"14px 16px" }}>
              <div style={{ width:34, height:34, borderRadius:8, background:`${color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, color, marginBottom:8 }}><i className={`fa fa-${icon}`}></i></div>
              <div style={S.label}>{label}</div>
              <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:700, color, marginTop:5 }}>{value}</div>
            </div>
          ))}
        </div>
      )}

      {/* Filters */}
      <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:200 }}>
          <i className="fa fa-search" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--tx3)", fontSize:13, pointerEvents:"none" }}></i>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search actions, students, users…" style={{ paddingLeft:32 }} />
        </div>
        <select value={filterBy} onChange={e=>setFilterBy(e.target.value)} style={{ width:"auto", fontSize:12 }}>
          <option value="">All Categories</option>
          {categories.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      {/* Log entries */}
      {auditLog.length === 0 ? (
        <Card>
          <Empty icon={<i className="fa fa-history" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No audit events recorded yet. Actions like logins, predictions and interventions will appear here." />
        </Card>
      ) : filtered.length === 0 ? (
        <Card><Empty icon={<i className="fa fa-search" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No events match your search." /></Card>
      ) : (
        <Card p={0}>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:"var(--sur2)" }}>
                  {["#","Time","Action","Target","Performed By"].map(h=>(
                    <th key={h} style={{ padding:"10px 16px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:".09em", color:"var(--tx3)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.slice(0,200).map((e,i)=>{
                  const { icon, color } = getIcon(e.action);
                  return (
                    <tr key={i} style={{ borderBottom:"1px solid var(--bdr)" }}
                      onMouseEnter={ev=>ev.currentTarget.style.background="rgba(59,130,246,.04)"}
                      onMouseLeave={ev=>ev.currentTarget.style.background=""}>
                      <td style={{ padding:"10px 16px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{filtered.length-i}</td>
                      <td style={{ padding:"10px 16px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)", whiteSpace:"nowrap" }}>
                        {new Date(e.ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})} {new Date(e.ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
                      </td>
                      <td style={{ padding:"10px 16px" }}>
                        <div style={S.flex(8,"center")}>
                          <div style={{ width:26, height:26, borderRadius:6, background:`${color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color, flexShrink:0 }}><i className={`fa fa-${icon}`}></i></div>
                          <span style={{ fontWeight:600, fontSize:12 }}>{e.action}</span>
                        </div>
                      </td>
                      <td style={{ padding:"10px 16px", fontSize:12, color:"var(--tx2)" }}>{e.target || "—"}</td>
                      <td style={{ padding:"10px 16px", fontSize:12, color:"var(--tx3)" }}>{e.by || "System"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {filtered.length > 200 && <div style={{ padding:"10px 16px", fontSize:12, color:"var(--tx3)", textAlign:"center" }}>Showing 200 of {filtered.length} events</div>}
        </Card>
      )}
    </div>
  );
};

// ─── STUDENT LIST TABLE ───────────────────────────────────────────────────────
const StudentListTable = ({ students, onView, onPredict, onEdit, onDelete, role, externalSearch="" }) => {
  const [search, setSearch] = useState(externalSearch);
  const [filterRisk, setFilterRisk] = useState("");
  const [page, setPage] = useState(1);
  const PER = 8;

  // Sync external search (from topbar) into local search
  React.useEffect(() => { setSearch(externalSearch); setPage(1); }, [externalSearch]);

  const filtered = useMemo(() => {
    let d = students.map(s => ({ ...s, _pred: mlPredict(s.att, s.gpa, s.fin, s.study) }));
    if(filterRisk === "risk") d = d.filter(s => s._pred.prediction === 1);
    if(filterRisk === "safe") d = d.filter(s => s._pred.prediction === 0);
    if(search) d = d.filter(s => `${s.name} ${s.sid} ${s.dept}`.toLowerCase().includes(search.toLowerCase()));
    return d;
  }, [students, search, filterRisk]);

  const pages = Math.max(1, Math.ceil(filtered.length / PER));
  const slice = filtered.slice((page-1)*PER, page*PER);

  return (
    <div>
      <div style={{ ...S.flex(10,"center"), marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:180 }}>
          <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--tx3)", fontSize:14, pointerEvents:"none" }}><i className="fa fa-search"></i></span>
          <input value={search} onChange={e => {setSearch(e.target.value);setPage(1);}} placeholder="Search name, ID, department…" style={{ paddingLeft:30 }} />
        </div>
        <select value={filterRisk} onChange={e => {setFilterRisk(e.target.value);setPage(1);}} style={{ width:"auto" }}>
          <option value="">All Status</option>
          <option value="risk">At Risk</option>
          <option value="safe">Not At Risk</option>
        </select>
      </div>
      <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"var(--sur2)" }}>
              {["SID","Name","Att.","GPA","Financial","Dept","Year","Status","Actions"].map(h => (
                <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {slice.map(s => (
              <tr key={s.id} style={{ borderBottom:"1px solid var(--bdr)", cursor:"pointer" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(59,130,246,.04)"}
                onMouseLeave={e => e.currentTarget.style.background=""}>
                <td style={{ padding:"11px 14px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{s.sid}</td>
                <td style={{ padding:"11px 14px", fontWeight:600 }} onClick={() => onView?.(s)}>{s.name}</td>
                <td style={{ padding:"11px 14px", fontFamily:"var(--mono)" }}>{s.att.toFixed(1)}%</td>
                <td style={{ padding:"11px 14px", fontFamily:"var(--mono)" }}>{s.gpa.toFixed(2)}</td>
                <td style={{ padding:"11px 14px" }}><FinBadge fin={s.fin} /></td>
                <td style={{ padding:"11px 14px", fontSize:12, color:"var(--tx3)" }}>{s.dept}</td>
                <td style={{ padding:"11px 14px", fontSize:12, color:"var(--tx3)" }}>{s.year}</td>
                <td style={{ padding:"11px 14px" }}><RiskBadge risk={s._pred.prediction} score={s._pred.risk} /></td>
                <td style={{ padding:"11px 14px", whiteSpace:"nowrap" }}>
                  <div style={S.flex(4)}>
                    {onView    && <Btn size="sm" variant="ghost" title="View Student"   onClick={() => onView(s)}><i className="fa fa-eye"></i></Btn>}

            ))}
          </tbody>
        </table>
        {slice.length === 0 && <Empty icon={<i className="fa fa-users" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students match your search." />}

        )}
      </div>

    </div>
  );
};

const PredictionForm = ({ student, onResult, onBack, depts=DEPTS }) => {
  const [form, setForm] = useState({
    att:  student ? student.att  : 75,
    gpa:  student ? student.gpa  : 2.8,
    fin:  student ? student.fin  : 1,
    study:student ? student.study: 3.0,
    name: student ? student.name : "",
    dept: student ? student.dept : "",
    notes: "",
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const PRESETS = [
    { label:"High Performer",   att:92, gpa:3.8, fin:0, study:7,   name:"High Performer" },
    { label:"Borderline",       att:68, gpa:2.4, fin:1, study:2.5, name:"Borderline" },
    { label:"High Risk",        att:42, gpa:1.8, fin:2, study:0.5, name:"High Risk" },
  ];

  const submit = () => {
    setError("");
    if(form.att < 0 || form.att > 100) { setError("Attendance must be 0–100%."); return; }

    setLoading(true);
    setTimeout(() => {
      const res = mlPredict(+form.att, +form.gpa, +form.fin, +form.study);
      setLoading(false);
      onResult?.(res, { att:+form.att, gpa:+form.gpa, fin:+form.fin, study:+form.study, name:form.name, dept:form.dept, notes:form.notes });

          {parseFloat(form[k]).toFixed(step < 1 ? 2 : 0)}{suffix}

      </div>
      <input type="number" min={min} max={max} step={step} value={form[k]}
        onChange={e => upd(k, parseFloat(e.target.value) || 0)} />

  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      {onBack && <Btn variant="ghost" size="sm" onClick={onBack} style={{ marginBottom:16 }}>← Back</Btn>}

      {!student && (

      <div style={S.grid("1fr 1fr", 14)}>
        <SliderField label="Attendance Rate (%)" k="att" min={0} max={100} step={1} suffix="%" />
        <SliderField label="GPA" k="gpa" min={1.5} max={4.0} step={0.05} />
        <SliderField label="Study Hours / Day" k="study" min={0} max={24} step={0.5} suffix="h" />
      </div>

      <FieldGroup label="Financial Status" required>
        <select value={form.fin} onChange={e => upd("fin", parseInt(e.target.value))}>
          <option value={0}>Good — No financial difficulties</option>
          <option value={1}>Moderate — Some financial strain</option>
          <option value={2}>Poor — Significant hardship</option>

      </FieldGroup>

      {!student && (
        <div style={S.grid("1fr 1fr", 12)}>

            <input value={form.name} onChange={e => upd("name", e.target.value)} placeholder="e.g. John Doe or STU-001" />
          </FieldGroup>
          <FieldGroup label="Department">
            <select value={form.dept} onChange={e => upd("dept", e.target.value)}>

          </FieldGroup>
        </div>

      <FieldGroup label="Notes (Optional)">
        <textarea value={form.notes} onChange={e => upd("notes", e.target.value)} placeholder="Additional observations…" />

// ─── ADD/EDIT STUDENT FORM ────────────────────────────────────────────────────
const StudentForm = ({ initial, onSave, onBack, title="Add New Student", depts=DEPTS, existingStudents=[] }) => {
  const [form, setForm] = useState(initial || { firstName:"", lastName:"", sid:"", att:"", gpa:"", study:"", fin:"0", dept:"", year:"", notes:"" });
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const upd = (k,v) => setForm(f => ({...f,[k]:v}));

  const isEditing = !!(initial && initial.id);
  const submit = () => {
    setError(""); setSuccess("");
    if(!form.firstName||!form.lastName) { setError("First and last name are required."); return; }
    if(!form.sid) { setError("Student ID is required."); return; }
    if(+form.att < 0 || +form.att > 100) { setError("Attendance must be 0–100%."); return; }
    if(+form.gpa < 1.5 || +form.gpa > 4.0) { setError("GPA must be 1.5–4.0."); return; }
    if(+form.study < 0 || +form.study > 24) { setError("Study hours must be 0–24."); return; }
    const fullName = `${form.firstName.trim()} ${form.lastName.trim()}`;
    const sidUpper = form.sid.trim().toUpperCase();
    // Duplicate check — skip the student's own record when editing
    const others = isEditing ? existingStudents.filter(s => String(s.id) !== String(initial.id)) : existingStudents;
    const dupSid  = others.find(s => s.sid  && s.sid.trim().toUpperCase() === sidUpper);
    const dupName = others.find(s => s.name && s.name.trim().toLowerCase() === fullName.toLowerCase());
    if(dupSid)  { setError(`Student ID "${form.sid}" is already assigned to ${dupSid.name}. Use a unique ID.`); return; }
    if(dupName) { setError(`A student named "${fullName}" already exists (${dupName.sid}). Check if this is a duplicate.`); return; }
    const pred = mlPredict(+form.att, +form.gpa, +form.fin, +form.study);
    const student = { ...form, name:fullName, att:+form.att, gpa:+form.gpa, fin:+form.fin, study:+form.study, _pred: pred };
    setSuccess(`Student "${student.name}" saved. Model predicts: ${pred.prediction===1?"At Risk":"Not at Risk"} (${(pred.risk*100).toFixed(1)}%)`);
    onSave?.(student);
  };

  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      {onBack && <Btn variant="ghost" size="sm" onClick={onBack} style={{ marginBottom:16 }}>← Back</Btn>}
      <div style={{ ...S.label, marginBottom:16 }}>{title}</div>

      <div style={S.grid("1fr 1fr",14)}>
        <FieldGroup label="First Name" required><input value={form.firstName} onChange={e=>upd("firstName",e.target.value)} placeholder="Alice" /></FieldGroup>
        <FieldGroup label="Last Name"  required><input value={form.lastName}  onChange={e=>upd("lastName",e.target.value)}  placeholder="Nakamya" /></FieldGroup>
        <FieldGroup label="Student ID" required><input value={form.sid}       onChange={e=>upd("sid",e.target.value)}        placeholder="STU-2024-001" /></FieldGroup>
        <FieldGroup label="Attendance (%)" required><input type="number" value={form.att} onChange={e=>upd("att",e.target.value)} min={0} max={100} step={0.1} placeholder="75" /></FieldGroup>
        <FieldGroup label="GPA (1.5–4.0)"  required><input type="number" value={form.gpa} onChange={e=>upd("gpa",e.target.value)} min={1.5} max={4.0} step={0.01} placeholder="2.80" /></FieldGroup>
        <FieldGroup label="Study Hours/Day" required><input type="number" value={form.study} onChange={e=>upd("study",e.target.value)} min={0} max={24} step={0.5} placeholder="3.0" /></FieldGroup>
        <FieldGroup label="Financial Status" required>
          <select value={form.fin} onChange={e=>upd("fin",e.target.value)}>
            <option value="0">Good</option><option value="1">Moderate</option><option value="2">Poor</option>
          </select>
        </FieldGroup>
        <FieldGroup label="Department">
          <select value={form.dept} onChange={e=>upd("dept",e.target.value)}>
            <option value="">— Select —</option>{depts.map(d=><option key={d}>{d}</option>)}
          </select>
        </FieldGroup>
        <FieldGroup label="Year of Study">
          <select value={form.year} onChange={e=>upd("year",e.target.value)}>
            <option value="">—</option>{["Year 1","Year 2","Year 3","Year 4","Postgraduate"].map(y=><option key={y}>{y}</option>)}
          </select>
        </FieldGroup>
      </div>
      <FieldGroup label="Notes"><textarea value={form.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Observations…" /></FieldGroup>

      {error   && <Alert type="error"   style={{ marginBottom:12 }}><i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{error}</Alert>}
      {success && <Alert type="success" style={{ marginBottom:12 }}><i className="fa fa-check-circle" style={{marginRight:6}}></i>{success}</Alert>}
      <Btn size="lg" onClick={submit} style={{ background:"var(--primary,#3b82f6)" }}><i className="fa fa-floppy-o"></i> Save Student</Btn>
    </div>
  );
};

                    background: isToday(d) ? "rgba(59,130,246,.08)" : d ? "transparent" : "var(--bg2)",
                    transition:"background .12s",
                    borderLeft: i%7===0 ? "none" : undefined,
                  }}
                  onMouseEnter={e=>{ if(d) e.currentTarget.style.background=isToday(d)?"rgba(59,130,246,.14)":"var(--sur2)"; }}
                  onMouseLeave={e=>{ if(d) e.currentTarget.style.background=isToday(d)?"rgba(59,130,246,.08)":"transparent"; }}>
                  {d && (
                    <>
                      <div style={{ fontSize:12, fontWeight:700, fontFamily:"var(--mono)", marginBottom:3,
                        color: isToday(d) ? "var(--primary,#3b82f6)" : "var(--tx2)",
                        width:22, height:22, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                        background: isToday(d) ? "var(--primary,#3b82f6)" : "none",
                        color: isToday(d) ? "#fff" : "var(--tx2)",
                      }}>{d}</div>
                      <div style={S.col(2)}>
                        {dayEvts.slice(0,3).map(ev=>(
                          <div key={ev.id}
                            onClick={e=>{e.stopPropagation();setSelEvent(ev);setModal("view");}}
                            style={{ background:`${ev.color}22`, border:`1px solid ${ev.color}55`, borderRadius:4, padding:"2px 5px",
                              fontSize:10, fontWeight:600, color:ev.color, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              cursor:"pointer", transition:"filter .1s" }}
                            onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.15)";e.stopPropagation();}}
                            onMouseLeave={e=>{e.currentTarget.style.filter="";}}
                          >{ev.title}</div>
                        ))}
                        {dayEvts.length>3 && <div style={{ fontSize:9, color:"var(--tx3)", fontFamily:"var(--mono)", paddingLeft:2 }}>+{dayEvts.length-3} more</div>}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── WEEK VIEW ── */}
      {view === "week" && (()=>{
        // Find Monday of the week containing today (or first of month)
        const baseDate = new Date(curYear, curMonth, today.getMonth()===curMonth && today.getFullYear()===curYear ? today.getDate() : 1);
        const dayOfWeek = baseDate.getDay();
        const monday = new Date(baseDate); monday.setDate(baseDate.getDate() - (dayOfWeek===0?6:dayOfWeek-1));
        const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
        return (
          <div style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:14, overflow:"hidden" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", background:"var(--sur2)", borderBottom:"1px solid var(--bdr)" }}>
              {weekDays.map((d,i)=>{
                const isTod = d.toDateString()===today.toDateString();
                return (
                  <div key={i} style={{ padding:"10px 6px", textAlign:"center", borderRight:i<6?"1px solid var(--bdr)":"none" }}>
                    <div style={{ fontSize:10, fontFamily:"var(--mono)", color:"var(--tx3)", textTransform:"uppercase", marginBottom:4 }}>{DAYS[d.getDay()]}</div>
                    <div style={{ width:28, height:28, borderRadius:"50%", margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:13, fontWeight:700, background:isTod?"var(--primary,#3b82f6)":"none", color:isTod?"#fff":"var(--tx)" }}>
                      {d.getDate()}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", minHeight:200 }}>
              {weekDays.map((d,i)=>{
                const ds = d.toISOString().slice(0,10);
                const dayEvts = events.filter(e=>e.date===ds&&(!filterType||e.type===filterType));
                return (
                  <div key={i} onClick={()=>openAdd(ds)}
                    style={{ minHeight:200, padding:6, borderRight:i<6?"1px solid var(--bdr)":"none", cursor:"pointer", transition:"background .12s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--sur2)"}
                    onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <div style={S.col(4)}>
                      {dayEvts.map(ev=>(
                        <div key={ev.id}
                          onClick={e=>{e.stopPropagation();setSelEvent(ev);setModal("view");}}
                          style={{ background:`${ev.color}22`, border:`1px solid ${ev.color}55`, borderRadius:6, padding:"4px 7px",
                            fontSize:11, fontWeight:600, color:ev.color, cursor:"pointer" }}
                          onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.15)";e.stopPropagation();}}
                          onMouseLeave={e=>e.currentTarget.style.filter=""}>

                  </div>
                );
              })}
            </div>
          </div>

      {/* ── AGENDA VIEW ── */}

        <div style={S.col(10)}>
          {agendaEvents.length === 0 && <Empty icon={<i className="fa fa-calendar" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No upcoming events." />}

              <div key={ev.id}>

                  <div style={{ fontSize:11, fontFamily:"var(--mono)", fontWeight:700, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:"0.1em",

              <Btn variant="danger" size="sm" onClick={()=>deleteEvent(selEvent.id)}><i className="fa fa-trash"></i> Delete</Btn>

      )}

      {/* ── ADD / EDIT MODAL ── */}
      {(modal === "add" || modal === "edit") && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}

          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:16, padding:28, width:"100%", maxWidth:460, animation:"fadeUp .2s ease" }}>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:20 }}>
              <div style={{ fontSize:16, fontWeight:800 }}>{modal==="edit"?"Edit Event":"New Event"}</div>
              <button onClick={()=>setModal(null)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:18, color:"var(--tx3)" }}>✕</button>
            </div>
            <FieldGroup label="Event Title" required>
              <input value={form.title} onChange={e=>upd("title",e.target.value)} placeholder="e.g. Midterm Exam" autoFocus />
            </FieldGroup>
            <div style={S.grid("1fr 1fr",12)}>
              <FieldGroup label="Date" required>
                <input type="date" value={form.date} onChange={e=>upd("date",e.target.value)} />
              </FieldGroup>
              <FieldGroup label="Event Type">
                <select value={form.type} onChange={e=>{ upd("type",e.target.value); upd("color",CALENDAR_COLORS[EVENT_TYPES.indexOf(e.target.value)%CALENDAR_COLORS.length]); }}>
                  {EVENT_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </FieldGroup>
            </div>
            <FieldGroup label="All Day?">
              <div style={S.flex(16,"center")}>
                {[true,false].map(v=>(
                  <label key={v} style={{ ...S.flex(6,"center"), cursor:"pointer", fontSize:13 }}>
                    <input type="radio" name="allDay" checked={form.allDay===v} onChange={()=>upd("allDay",v)} style={{ width:"auto", margin:0 }} />
                    {v?"All Day":"Specific Time"}
                  </label>
                ))}
              </div>
            </FieldGroup>
            {!form.allDay && (
              <FieldGroup label="Time">
                <input type="time" value={form.time} onChange={e=>upd("time",e.target.value)} />
              </FieldGroup>
            )}
            <FieldGroup label="Color">
              <div style={S.flex(8,"center")}>
                {CALENDAR_COLORS.map(c=>(
                  <div key={c} onClick={()=>upd("color",c)}
                    style={{ width:22, height:22, borderRadius:"50%", background:c, cursor:"pointer",
                      border: form.color===c ? "3px solid var(--tx)" : "3px solid transparent", transition:"border .1s" }} />
                ))}
              </div>
            </FieldGroup>
            <FieldGroup label="Description">
              <textarea value={form.desc} onChange={e=>upd("desc",e.target.value)} placeholder="Optional details…" style={{ minHeight:60 }} />
            </FieldGroup>
            <div style={S.flex(8)}>
              <Btn size="md" onClick={saveEvent} disabled={!form.title.trim()||!form.date}
                style={{ background:"var(--primary,#3b82f6)", flex:1, justifyContent:"center" }}>
                {modal==="edit"?<><i className="fa fa-floppy-o"></i> Save Changes</>:<><i className="fa fa-plus"></i> Add Event</>}
              </Btn>
              <Btn size="md" variant="ghost" onClick={()=>setModal(null)}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── BULK PREDICTION PAGE ─────────────────────────────────────────────────────
const BulkPredictionPage = ({ students, addPred, userName, setStudents, addAudit }) => {
  const [ran, setRan] = useState(false);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);
  const [filterMode, setFilterMode] = useState("all"); // "all" | "risk" | "safe"

  // Only run on students who have real data entered
  const eligibleStudents = students.filter(s => s.att > 0 || s.gpa > 0 || s.study > 0);
  const skippedStudents  = students.filter(s => s.att === 0 && s.gpa === 0 && s.study === 0);

  const runAll = () => {
    if(eligibleStudents.length === 0) return;
    setLoading(true);
    setTimeout(() => {
      const res = eligibleStudents.map(s => {
        const pred = mlPredict(s.att, s.gpa, s.fin, s.study);
        addPred({ res:pred, student:s, ts:new Date().toISOString(), by:userName, studentId:s.id });
        return { ...s, _pred: pred };
      });
      const atRiskCount = res.filter(r=>r._pred.prediction===1).length;
      addAudit?.({ action:`Bulk prediction run: ${res.length} students analysed, ${atRiskCount} at risk`, target:`${res.length} students`, by:userName });
      // Sync student records with the data used
      setStudents(prev => {
        const next = prev.map(s => {
          const updated = res.find(r => r.id === s.id);
          return updated ? { ...s, att:+updated.att, gpa:+updated.gpa, fin:+updated.fin, study:+updated.study } : s;
        });
        lsSet("dai_s", next);
        return next;
      });
      setResults(res);
      setRan(true);
      setLoading(false);
    }, 900);
  };

  const exportCSV = () => {
    const dateStr = new Date().toISOString().split("T")[0];
    const rows = [
      ["Name","Student ID","Department","Year","Attendance %","GPA","Financial Status","Study Hours/Day","Risk Score %","Prediction","Confidence %"],
      ...results.map(s => [
        s.name,
        s.sid,
        s.dept,
        s.year,
        s.att,
        s.gpa,
        ["Good","Moderate","Poor"][s.fin] || "Unknown",
        s.study,
        (s._pred.risk*100).toFixed(2),
        s._pred.prediction===1 ? "At Risk" : "Safe",
        (s._pred.confidence*100).toFixed(2)
      ])
    ];
    downloadCSV(`bulk_prediction_${dateStr}.csv`, rows);
  };

  const atRisk = results.filter(s=>s._pred.prediction===1);
  const safe   = results.filter(s=>s._pred.prediction===0);
  const displayResults = filterMode==="risk" ? atRisk : filterMode==="safe" ? safe : results;

  return (
    <div style={S.col(20)}>
      <div>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-magic" style={{fontSize:18,marginRight:8}}></i>Bulk Prediction</h2>
        <p style={S.sub}>Run the dropout risk model on all students at once and get a full summary.</p>
