                  : <div style={{ width:38, height:38, borderRadius:"50%", background:u.color||"#3b82f6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#fff", flexShrink:0 }}>
                      {u.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}
                    </div>
                }
                {/* Info */}
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"var(--tx)" }}>{u.name}</div>
                  <div style={{ fontSize:11, color:"var(--tx3)" }}>{u.email} · <Badge color={ROLE_THEMES[u.role]?.primary||"#3b82f6"}>{u.role}</Badge></div>
                </div>
                {/* Password display */}
                <div style={{ display:"flex", alignItems:"center", gap:8, background:"var(--bg2)", border:"1px solid var(--bdr)", borderRadius:8, padding:"6px 12px", fontFamily:"var(--mono)", fontSize:13, minWidth:140 }}>
                  <i className="fa fa-lock" style={{ color:"var(--tx3)", fontSize:11 }}></i>
                  <span style={{ flex:1, color: reveal[u.id] ? "var(--tx)" : "var(--tx3)", letterSpacing: reveal[u.id] ? "normal" : "0.15em" }}>{pwdDisplay}</span>
                  <button onClick={() => setReveal(r=>({...r,[u.id]:!r[u.id]}))}
                    title={reveal[u.id]?"Hide password":"Reveal password"}
                    style={{ background:"none", border:"none", cursor:"pointer", color:"var(--tx3)", fontSize:13, padding:0 }}>
                    <i className={`fa fa-eye${reveal[u.id]?"-slash":""}`}></i>
                  </button>
                </div>
                {/* Reset button */}
                <Btn size="sm" onClick={() => { setResetFor(u); setNewPwd(""); setPwdMsg(""); }} style={{ background:"#f59e0b", color:"#000" }}>
                  <i className="fa fa-key"></i> Reset
                </Btn>
              </div>
            );
          })}
        </div>
      )}

      {/* ── RESET PASSWORD MODAL ── */}
      {resetFor && (
        <div onClick={() => setResetFor(null)}
          style={{ position:"fixed", inset:0, zIndex:600, background:"rgba(0,0,0,.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:18, width:"100%", maxWidth:420, padding:28, boxShadow:"0 24px 64px rgba(0,0,0,.5)", animation:"fadeUp .2s ease" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
              <div style={{ width:44, height:44, borderRadius:12, background:"rgba(245,158,11,.15)", border:"1px solid rgba(245,158,11,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:"#f59e0b" }}>
                <i className="fa fa-key"></i>
              </div>
              <div>
                <div style={{ fontSize:15, fontWeight:800, color:"var(--tx)" }}>Reset Password</div>
                <div style={{ fontSize:12, color:"var(--tx3)", marginTop:2 }}>{resetFor.name} · {resetFor.role}</div>
              </div>
              <button onClick={()=>setResetFor(null)} style={{ marginLeft:"auto", background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:8, width:30, height:30, cursor:"pointer", color:"var(--tx2)", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <i className="fa fa-times"></i>
              </button>
            </div>
            {resetFor.role === "student" && (
              <div style={{ background:"rgba(14,165,233,.08)", border:"1px solid rgba(14,165,233,.2)", borderRadius:8, padding:"10px 14px", fontSize:12, color:"#0ea5e9", marginBottom:14 }}>
                <i className="fa fa-info-circle" style={{marginRight:6}}></i>
                Student passwords are their <strong>date of birth in DDMMYYYY</strong> format (e.g. 15031999).
              </div>
            )}
            {(resetFor.role === "lecturer" || resetFor.role === "admin") && (
              <div style={{ background:"rgba(139,92,246,.08)", border:"1px solid rgba(139,92,246,.2)", borderRadius:8, padding:"10px 14px", fontSize:12, color:"#8b5cf6", marginBottom:14 }}>
                <i className="fa fa-info-circle" style={{marginRight:6}}></i>
                Must include letters, numbers and a symbol. <strong>Max 8 characters.</strong>
              </div>
            )}
            <FieldGroup label="New Password" required>
              <input type="text" value={newPwd} onChange={e=>setNewPwd(e.target.value)}
                placeholder={resetFor.role==="student" ? "e.g. 15031999 (DDMMYYYY)" : "e.g. Dr@2025"}
                maxLength={resetFor.role==="student" ? 8 : 8}
                autoFocus
                onKeyDown={e => e.key==="Enter" && savePassword()}
              />
              {newPwd && (resetFor.role==="lecturer"||resetFor.role==="admin") && (() => {
                const v = validateLecPwd(newPwd);
                return <div style={{ fontSize:11, marginTop:4, color: v.valid?"var(--green)":"var(--red)" }}><i className={`fa fa-${v.valid?"check":"times"}-circle`} style={{marginRight:4}}></i>{v.msg}</div>;
              })()}
            </FieldGroup>
            {pwdMsg && <Alert type={pwdMsg.startsWith("error")?"error":"success"} style={{ marginBottom:12 }}>{pwdMsg.split(":")[1]}</Alert>}
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <Btn variant="ghost" onClick={()=>setResetFor(null)}>Cancel</Btn>
              <Btn onClick={savePassword} style={{ background:"#f59e0b", color:"#000" }}>
                <i className="fa fa-check"></i> Save Password
              </Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── SETTINGS PAGE ────────────────────────────────────────────────────────────
const SettingsPage = () => {
  const { settings, updateSettings } = useContext(SettingsCtx);
  const [form, setForm] = useState({ ...settings });
  const [saved, setSaved] = useState("");
  const upd = (k,v) => setForm(f => ({...f, [k]:v}));

  const save = (section) => {
    const updates = {};
    if(section === "system") {
      updates.systemName   = form.systemName;
      updates.institution  = form.institution;
      updates.academicYear = form.academicYear;
      const t = Math.min(90, Math.max(10, parseFloat(form.riskThreshold)||50));
      updates.riskThreshold = t;
      THRESHOLD_REF.value = t / 100; // apply immediately to mlPredict
    }
    if(section === "model") {
      updates.retrainSchedule = form.retrainSchedule;
      updates.attThreshold = Math.min(100, Math.max(0, parseInt(form.attThreshold)||70));
    }
    if(section === "data") {
      updates.sessionTimeout = form.sessionTimeout;
      updates.dataRetention  = form.dataRetention;
      updates.exportFormat   = form.exportFormat;
    }
    updateSettings(updates);
    setSaved(section);
    setTimeout(() => setSaved(""), 3000);
  };

  const F = ({ label, name, type="text", min, max, suffix, hint, readOnly }) => (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontSize:11, fontWeight:600, color:"var(--tx3)", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.07em" }}>{label}</label>
      <div style={{ position:"relative" }}>
        <input type={type} min={min} max={max} readOnly={readOnly}
          value={form[name]||""} onChange={e => !readOnly && upd(name, e.target.value)}
          style={{ background:"var(--bg2)", paddingRight: suffix?36:undefined, cursor:readOnly?"not-allowed":undefined, opacity:readOnly?.6:1 }} />
        {suffix && <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:12, color:"var(--tx3)", pointerEvents:"none" }}>{suffix}</span>}
      </div>
      {hint && <div style={{ fontSize:10, color:"var(--tx3)", marginTop:4 }}><i className="fa fa-info-circle" style={{marginRight:4}}></i>{hint}</div>}
    </div>
  );

  const Sel = ({ label, name, options }) => (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontSize:11, fontWeight:600, color:"var(--tx3)", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.07em" }}>{label}</label>
      <select value={form[name]||""} onChange={e=>upd(name,e.target.value)} style={{ background:"var(--bg2)" }}>
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
    </div>
  );

  const SaveBtn = ({section}) => (
    <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:6 }}>
      <Btn onClick={()=>save(section)} style={{ background:"var(--primary,#f59e0b)", color:"#000" }}>
        <i className="fa fa-check"></i> Apply
      </Btn>
      {saved===section && <span style={{ fontSize:12, color:"var(--green)", display:"flex", alignItems:"center", gap:4 }}><i className="fa fa-check-circle"></i> Saved!</span>}
    </div>
  );

  return (
    <div style={S.col(20)}>
      <div>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-sliders" style={{fontSize:18,marginRight:8}}></i>System Settings</h2>
        <p style={S.sub}>Configure system behaviour, model thresholds and data preferences. Changes apply immediately.</p>
      </div>
      <div style={{ height:1, background:"#000" }} />

      <div style={S.grid("1fr 1fr", 20)}>

        <Card>
          <CardHeader title="System Settings" />
          <F name="systemName"    label="System Name"     hint="Shown in the header and reports." />
          <F name="institution"   label="Institution"     hint="Your university name — shown in footer." />
          <F name="academicYear"  label="Academic Year"   hint='e.g. 2025/2026' />
          <F name="riskThreshold" label="Risk Threshold (%)" type="number" min={10} max={90} suffix="%" hint={`Students with risk score ≥ ${form.riskThreshold||50}% are flagged At-Risk.`} />
          <SaveBtn section="system" />
        </Card>

        <Card>
          <CardHeader title="Model Settings" />
          <F name="algorithm" label="Algorithm" readOnly hint="Algorithm cannot be changed." />
          <Sel name="retrainSchedule" label="Retrain Schedule" options={["Every Semester","Every Month","Every Year","Manual Only"]} />
          <F name="attThreshold" label="Low Attendance Alert (%)" type="number" min={0} max={100} suffix="%" hint={`Students below ${form.attThreshold||70}% get a low-attendance notification.`} />
          <F name="featureSet" label="Feature Set" readOnly hint="Fixed: Attendance, GPA, Financial, Study Hours." />
          <SaveBtn section="model" />
        </Card>

        <Card>
          <CardHeader title="Notification Settings" />
          <div style={{ padding:"12px 14px", background:"rgba(59,130,246,.07)", border:"1px solid rgba(59,130,246,.2)", borderRadius:8, marginBottom:14 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"var(--blue)", marginBottom:6 }}><i className="fa fa-bell" style={{marginRight:6}}></i>Live Alerts Active</div>
            <div style={{ fontSize:11, color:"var(--tx3)", lineHeight:1.7 }}>
              Alerts fire automatically when:<br/>
              • Risk score ≥ <strong>{form.riskThreshold||50}%</strong> → At-Risk flag<br/>
              • Attendance &lt; <strong>{form.attThreshold||70}%</strong> → Low attendance<br/>
              • GPA &lt; 2.0 → Academic alert<br/>
              • New student registers → Admin/Lecturer notified
            </div>
          </div>
          <div style={{ fontSize:11, color:"var(--tx3)", padding:"8px 12px", background:"rgba(16,185,129,.06)", borderRadius:7, border:"1px solid rgba(16,185,129,.2)" }}>
            <i className="fa fa-info-circle" style={{marginRight:6, color:"var(--green)"}}></i>
            Notifications update in real-time. No email server needed.
          </div>
        </Card>

        <Card>
          <CardHeader title="Data & Security" />
          <Sel name="dataRetention"  label="Data Retention"  options={["1 Year","2 Years","5 Years","Indefinite"]} />
          <Sel name="exportFormat"   label="Export Format"   options={["CSV / HTML","CSV Only","HTML Only"]} />
          <Sel name="sessionTimeout" label="Session Timeout" options={["1 Hour","2 Hours","4 Hours","8 Hours","Never"]} />
          <div style={{ marginBottom:14, padding:"10px 12px", background:"rgba(245,158,11,.07)", border:"1px solid rgba(245,158,11,.2)", borderRadius:8, fontSize:11, color:"var(--amber)", lineHeight:1.6 }}>
            <i className="fa fa-lock" style={{marginRight:6}}></i>
            <strong>Students</strong> use DOB as password (DDMMYYYY).<br/>
            <strong>Lecturers</strong> use a custom password (letters + numbers + symbol, max 8 chars).
          </div>
          <SaveBtn section="data" />
          <div style={{ marginTop:16, padding:"14px", background:"rgba(239,68,68,.06)", border:"1px solid rgba(239,68,68,.25)", borderRadius:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"var(--red)", marginBottom:8 }}><i className="fa fa-warning" style={{marginRight:6}}></i>Danger Zone</div>
            <Btn variant="danger" size="sm" onClick={() => { if(window.confirm("Reset ALL data? This cannot be undone.")) { localStorage.clear(); window.location.reload(); } }}>
              <i className="fa fa-trash"></i> Reset All Data
            </Btn>
            <div style={{ fontSize:10, color:"var(--tx3)", marginTop:6 }}>Clears all data and reloads the system.</div>
          </div>
        </Card>

      </div>
    </div>
  );
};

// ─── PREDICTION HISTORY TABLE ─────────────────────────────────────────────────
const PredHistoryTable = ({ history, title="Prediction History", onDelete }) => {
  const [filter, setFilter] = useState("");
  const filtered = filter ? history.filter(h => filter==="risk"?h.res.prediction===1:h.res.prediction===0) : history;
  const cols = ["Time","Name","Att.","GPA","Fin.","Study","Result","Risk%","By", ...(onDelete?["Action"]:[])];
  return (
    <div style={S.col(14)}>
      <div style={S.flex(10,"center")}>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{ width:"auto" }}>
          <option value="">All Results</option>
          <option value="risk">At Risk Only</option>
          <option value="safe">Safe Only</option>
        </select>
        <span style={{ fontSize:12, color:"var(--tx3)", marginLeft:"auto" }}>{filtered.length} records</span>
      </div>
      <div style={{ overflowX:"auto", border:"1px solid var(--bdr)", borderRadius:12, background:"var(--sur)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr style={{ background:"var(--sur2)" }}>
              {cols.map(h=>(
                <th key={h} style={{ padding:"9px 12px", textAlign:"left", fontSize:10, textTransform:"uppercase", letterSpacing:"0.09em", color:"var(--tx3)", fontFamily:"var(--mono)", borderBottom:"1px solid var(--bdr)", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((h,i) => {
              const ir = h.res.prediction === 1;
              return (
                <tr key={i} style={{ borderBottom:"1px solid var(--bdr)" }}>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)", fontSize:11, color:"var(--tx3)" }}>{new Date(h.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</td>
                  <td style={{ padding:"10px 12px", fontWeight:600 }}>{h.student.name||"—"}</td>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)" }}>{h.student.att}%</td>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)" }}>{h.student.gpa}</td>
                  <td style={{ padding:"10px 12px" }}><FinBadge fin={h.student.fin} /></td>
                  <td style={{ padding:"10px 12px" }}>{h.student.study}h</td>
                  <td style={{ padding:"10px 12px" }}><RiskBadge risk={h.res.prediction} /></td>
                  <td style={{ padding:"10px 12px", fontFamily:"var(--mono)", fontWeight:700, color: ir?"var(--red)":"var(--green)" }}>{(h.res.risk*100).toFixed(1)}%</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"var(--tx3)" }}>{h.by||"—"}</td>
                  {onDelete && (
                    <td style={{ padding:"6px 12px" }}>
                      <Btn size="sm" variant="danger" title="Delete Prediction" onClick={() => {
                        if(window.confirm(`Delete this prediction for ${h.student?.name}?`)) onDelete(h.ts);
                      }}>
                        <i className="fa fa-trash"></i>
                      </Btn>
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0 && <Empty icon={<i className="fa fa-clipboard" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No predictions yet." />}
      </div>
    </div>
  );
};

// ─── STUDENT DASHBOARD ────────────────────────────────────────────────────────
const StudentDashboard = ({ page, setPage, students, predHistory, interventions=[], globalSearch="", setGlobalSearch }) => {
  const { user } = useContext(AuthCtx);
  const myData = students.find(s =>
    s.id === user.studentId ||
    s.id === user.id ||
    s.sid === user.sid ||
    s.sid === user.studentId ||
    (s.name && user.name && s.name.toLowerCase().trim() === user.name.toLowerCase().trim())
  ) || null;
  // Use the actual student record ID for matching predictions/interventions
  const myId = myData?.id ?? user.studentId;
  const myPreds = predHistory.filter(h =>
    h.studentId === myId ||
    h.studentId === user.studentId ||
    h.studentId === user.id ||
    h.studentId === user.sid ||
    (h.student?.name && user.name && h.student.name.toLowerCase().trim() === user.name.toLowerCase().trim())
  );
  const latestPred = myPreds[0];
  const myInterventions = interventions.filter(i =>
    i.studentId === myId ||
    i.studentId === user.studentId ||
    i.studentId === user.id ||
    i.studentId === user.sid ||
    (i.studentName && user.name && i.studentName.toLowerCase().trim() === user.name.toLowerCase().trim())
  );

  if(page === "my-profile") {
    return (
      <RoleBasedRoute allowed={["student"]}>
        <EditableProfilePage role="student" />
      </RoleBasedRoute>
    );
  }

  if(page === "calendar") return (
    <RoleBasedRoute allowed={["student"]}>
      <CalendarPage />
    </RoleBasedRoute>
  );

  if(page === "my-predictions") return (
    <RoleBasedRoute allowed={["student"]}>
      <div style={S.col(20)}>
        <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-magic" style={{fontSize:18,marginRight:8}}></i>My Predictions</h2>
        <div style={{ height:1, background:"#000", marginTop:16, marginBottom:4 }} />
        <PredHistoryTable history={myPreds} />
      </div>
    </RoleBasedRoute>
  );

  // keep rest of student dashboard going — dummy branch for old profile rendering

  // Default: my-dashboard
  // Check if student has real data yet (att and gpa both 0 means freshly registered, no data entered)
  // isNewStudent: only show welcome screen if BOTH no student record data AND no predictions
  const hasStudentData = myData && (myData.att > 0 || myData.gpa > 0 || myData.study > 0);
  const isNewStudent = !hasStudentData && myPreds.length === 0;

  if(isNewStudent) {
    return (
      <RoleBasedRoute allowed={["student"]}>
        <div style={S.col(20)}>
          {/* Welcome header */}
          <div style={{ ...S.card(28), background:"var(--sur2)", border:"1px solid rgba(14,165,233,.25)", boxShadow:"0 4px 18px rgba(14,165,233,.1)", textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:12 }}><i className="fa fa-graduation-cap"></i></div>
            <div style={{ fontSize:22, fontWeight:800, marginBottom:6 }}>Welcome, {user.name.split(" ")[0]}!</div>
            <div style={{ fontSize:14, color:"var(--tx2)", maxWidth:420, margin:"0 auto", lineHeight:1.7 }}>
              Your account is all set up. Your dashboard will come alive once your lecturer enters your academic data.
            </div>
          </div>

          {/* Status steps */}
          <Card>
            <CardHeader title="Getting Started" />
            <div style={S.col(0)}>
              {[
                { step:1, done:true,  icon:<i className="fa fa-check-circle" style={{color:"var(--green)"}}></i>, title:"Account Created",           desc:"You've successfully registered on DropoutAI." },
                { step:2, done:true,  icon:<i className="fa fa-check-circle" style={{color:"var(--green)"}}></i>, title:"Profile Complete",           desc:`${myData?.dept || user.dept} · ${myData?.year || "—"} — your details are locked and verified.` },
                { step:3, done:!!(myData && (myData.att > 0 || myData.gpa > 0 || myData.study > 0)),  icon: myData && (myData.att > 0 || myData.gpa > 0) ? <i className="fa fa-check-circle" style={{color:"var(--green)"}}></i> : <i className="fa fa-hourglass-half"></i>, title:"Academic Data Entered", desc: myData && (myData.att > 0 || myData.gpa > 0) ? `Attendance: ${myData.att}% · GPA: ${myData.gpa} · Study: ${myData.study}h` : "Your lecturer will enter your attendance, GPA, study hours and financial status." },
                { step:4, done:myPreds.length > 0, icon: myPreds.length > 0 ? <i className="fa fa-check-circle" style={{color:"var(--green)"}}></i> : <i className="fa fa-lock"></i>, title:"Prediction Run",        desc: myPreds.length > 0 ? `${myPreds.length} prediction${myPreds.length>1?"s":""} run — latest by ${myPreds[0]?.by}` : "Once data is entered, the AI model will generate your dropout risk prediction." },
                { step:5, done:myPreds.length > 0, icon: myPreds.length > 0 ? <i className="fa fa-check-circle" style={{color:"var(--green)"}}></i> : <i className="fa fa-lock"></i>, title:"View Your Results",      desc: myPreds.length > 0 ? `Risk score: ${(myPreds[0]?.res?.risk*100).toFixed(1)}% — ${myPreds[0]?.res?.prediction===1?"At Risk":"Safe"}. Click My Predictions to see full details.` : "Your risk score, confidence level and personalised recommendations will appear here." },
              ].map(({ step, done, icon, title, desc }) => (
                <div key={step} style={{ display:"flex", gap:14, padding:"14px 0", borderBottom:"1px solid var(--bdr)", opacity: done ? 1 : 0.5 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background: done ? "rgba(16,185,129,.15)" : "rgba(255,255,255,.04)", border:`1px solid ${done?"rgba(16,185,129,.4)":"var(--bdr)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>{icon}</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, marginBottom:3, color: done ? "var(--tx)" : "var(--tx3)" }}>{title}</div>
                    <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6 }}>{desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {/* Info cards row */}
          <div style={S.grid("1fr 1fr 1fr", 16)}>
            <div style={{ ...S.card(20), background:"rgba(14,165,233,.07)", border:"1px solid rgba(14,165,233,.2)" }}>
              <div style={{ fontSize:24, marginBottom:8 }}><i className="fa fa-clipboard"></i></div>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:4 }}>Your Profile</div>
              <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6, marginBottom:12 }}>Your name, department and year are locked. Contact your lecturer for any corrections.</div>
              <Btn size="sm" variant="ghost" onClick={() => setPage("my-profile")}>View Profile →</Btn>
            </div>
            <div style={{ ...S.card(20), background:"rgba(139,92,246,.07)", border:"1px solid rgba(139,92,246,.2)" }}>
              <div style={{ fontSize:24, marginBottom:8 }}><i className="fa fa-magic"></i></div>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:4 }}>Predictions</div>
              <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6, marginBottom:12 }}>No predictions yet. Your lecturer will run the AI model once your data is entered.</div>
              <Btn size="sm" variant="ghost" onClick={() => setPage("my-predictions")}>View History →</Btn>

            <div style={{ ...S.card(20), background:"rgba(16,185,129,.07)", border:"1px solid rgba(16,185,129,.2)" }}>
              <div style={{ fontSize:24, marginBottom:8 }}><i className="fa fa-info-circle"></i></div>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:4 }}>Model Accuracy</div>
              <div style={{ fontSize:12, color:"var(--tx3)", lineHeight:1.6, marginBottom:8 }}>The prediction model has an <strong style={{color:"var(--green)"}}>82.5%</strong> accuracy rate based on attendance, GPA, financial status and study hours.</div>
            </div>
          </div>

          {/* Profile quick-view */}
          <Card>
            <CardHeader title="My Registered Details" action={<Btn size="sm" variant="ghost" onClick={() => setPage("my-profile")}>Full Profile →</Btn>} />
            <div style={S.grid("repeat(3,1fr)", 12)}>
              {[["Name", myData?.name || user.name, "#0ea5e9"], ["Department", myData?.dept || user.dept, "#8b5cf6"], ["Year of Study", myData?.year || "—", "#10b981"]].map(([k,v,c]) => (
                <div key={k} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:14 }}>
                  <div style={{ ...S.label, marginBottom:6 }}>{k}</div>
                  <div style={{ fontSize:14, fontWeight:700, color:c }}>{v || "—"}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </RoleBasedRoute>
    );
  }

  // displayData: use student record if it has data, otherwise fall back to latest prediction's data
  // When all predictions deleted → falls back to student record (which may have zeros)
  const latestPredData = myPreds.length > 0 ? myPreds[0].student : null;
  const displayData = hasStudentData
    ? myData
    : latestPredData
      ? { ...myData, att: latestPredData.att, gpa: latestPredData.gpa, fin: latestPredData.fin, study: latestPredData.study, dept: latestPredData.dept || myData?.dept || user.dept, year: myData?.year || user.year }
      : myData;

  // pred: use latest prediction result if predictions exist, otherwise compute from displayData
  const pred = myPreds.length > 0
    ? myPreds[0].res
    : (displayData && (displayData.att > 0 || displayData.gpa > 0))
      ? mlPredict(displayData.att, displayData.gpa, displayData.fin, displayData.study)
      : null;

  return (
    <RoleBasedRoute allowed={["student"]}>
      <div style={S.col(20)}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-graduation-cap" style={{fontSize:18,marginRight:8}}></i>My Dashboard</h2>
            <p style={S.sub}>Welcome back, {user.name.split(" ")[0]}. Here's your academic overview.</p>
            <div style={{ height:1, background:"#000", marginTop:16 }} />
          </div>
          <Btn variant="ghost" onClick={() => setPage("my-profile")}>View Full Profile →</Btn>
        </div>

        {/* KPI Cards */}
        <div style={S.grid("repeat(4,1fr)",16)}>
          <KPI label="Attendance"  value={displayData ? `${Number(displayData.att).toFixed(0)}%` : "—"} color={displayData?.att<70?"#ef4444":"#10b981"} icon={<i className="fa fa-calendar"></i>} sub={displayData?.att<70?"Below threshold":"Above threshold"} />
          <KPI label="GPA"         value={displayData ? Number(displayData.gpa).toFixed(2) : "—"} color={displayData?.gpa<2?"#ef4444":displayData?.gpa<2.5?"#f59e0b":"#10b981"} icon={<i className="fa fa-book"></i>} sub="Current grade" />
          <KPI label="Study Hrs"   value={displayData ? `${displayData.study}h` : "—"} color="#0ea5e9" icon={<i className="fa fa-clock-o"></i>} sub="Per day" />
          <KPI label="Risk Score"  value={pred ? `${(pred.risk*100).toFixed(1)}%` : "—"} color={pred?.prediction===1?"#ef4444":"#10b981"} icon={<i className="fa fa-bar-chart"></i>} sub={pred?.prediction===1?"At Risk":"Not At Risk"} />
        </div>

        <div style={S.grid("1fr 1fr",20)}>
          <Card>
            <CardHeader title="My Latest Prediction Result" />
            {pred && displayData
              ? <PredictionResultCard result={pred} student={displayData} />
              : <div style={{ textAlign:"center", padding:24, color:"var(--tx3)" }}>No prediction run yet.</div>
            }
            {myPreds.length > 0 && (
              <div style={{ marginTop:12, fontSize:11, color:"var(--tx3)", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <i className="fa fa-clock-o"></i>
                Last run: {new Date(myPreds[0].ts).toLocaleString()} by <strong style={{color:"var(--tx2)"}}>{myPreds[0].by}</strong>
                <Btn size="sm" variant="ghost" onClick={() => setPage("my-predictions")}>Full History ({myPreds.length}) →</Btn>
              </div>
            )}
          </Card>
          <div style={S.col(16)}>
            <Card>
              <CardHeader title="Performance Summary" />
              {displayData ? (
                [["Attendance", Number(displayData.att), 100, "#10b981"],
                 ["GPA", (Number(displayData.gpa)-1.5)/2.5*100, 100, "#8b5cf6"],
                 ["Study Hours", Number(displayData.study)/24*100, 100, "#0ea5e9"]
                ].map(([l,v,max,c])=>(
                  <div key={l} style={{ marginBottom:14 }}>
                    <div style={{ ...S.flex(0,"center","space-between"), fontSize:12, color:"var(--tx2)", marginBottom:5 }}>
                      <span>{l}</span>
                      <span style={{ fontFamily:"var(--mono)", color:c, fontWeight:700 }}>
                        {l==="Attendance" ? `${Number(displayData.att).toFixed(0)}%`
                          : l==="GPA" ? Number(displayData.gpa).toFixed(2)
                          : `${displayData.study}h`}
                      </span>
                    </div>
                    <div style={{ height:6, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${Math.min(Math.max(v,0),100)}%`, background:c, borderRadius:3, transition:"width .8s ease" }} />
                    </div>
                  </div>
                ))
              ) : <div style={{ color:"var(--tx3)", fontSize:12, padding:8 }}>No academic data yet.</div>}
            </Card>
            <Card>
              <CardHeader title="Academic Details" />
              <div style={S.col(8)}>
                {[
                  ["Attendance", displayData ? `${Number(displayData.att).toFixed(0)}%` : "—"],
                  ["GPA", displayData ? Number(displayData.gpa).toFixed(2) : "—"],
                  ["Study Hours/Day", displayData ? `${displayData.study}h` : "—"],
                  ["Financial Status", displayData ? ["Good","Moderate","Poor"][displayData.fin] : "—"],
                  ["Department", displayData?.dept || user.dept || "—"],
                  ["Year", displayData?.year || user.year || "—"],
                  ["Model Accuracy","82.5%"]
                ].map(([k,v])=>(
                  <div key={k} style={{ ...S.flex(0,"center","space-between"), padding:"7px 0", borderBottom:"1px solid var(--bdr)", fontSize:13 }}>
                    <span style={{ color:"var(--tx3)" }}>{k}</span>
                    <span style={{ fontWeight:600 }}>{v}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>

        {/* Interventions logged for this student */}
        <Card>
          <CardHeader title="Interventions Logged For Me" />
          {myInterventions.length === 0 ? (
            <div style={{ textAlign:"center", padding:"24px 16px" }}>
              <div style={{ fontSize:32, marginBottom:8, color:"var(--tx3)" }}><i className="fa fa-clipboard"></i></div>
              <div style={{ fontSize:13, color:"var(--tx3)" }}>No interventions logged yet. Your lecturer will record support actions here.</div>
            </div>
          ) : (
            <div style={S.col(10)}>
              {myInterventions.map((iv, i) => (
                <div key={i} style={{ padding:"12px 14px", background:"var(--sur2)", border:"1px solid var(--bdr)", borderLeft:"4px solid #10b981", borderRadius:8, display:"flex", gap:12, alignItems:"flex-start" }}>
                  <div style={{ width:36, height:36, borderRadius:8, background:"rgba(16,185,129,.12)", border:"1px solid rgba(16,185,129,.25)", display:"flex", alignItems:"center", justifyContent:"center", color:"#10b981", flexShrink:0 }}>
                    <i className="fa fa-clipboard"></i>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                      <span style={{ fontSize:13, fontWeight:700, color:"var(--tx)" }}>{iv.type || "Support"}</span>
                      <span style={{ fontSize:10, color:"var(--tx3)", fontFamily:"var(--mono)" }}>{iv.date || "—"}</span>
                    </div>
                    <div style={{ fontSize:12, color:"var(--tx2)", lineHeight:1.6 }}>{iv.note || iv.notes || "—"}</div>
                    <div style={{ fontSize:11, color:"var(--tx3)", marginTop:4 }}>By: {iv.by || "—"}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      </div>
    </RoleBasedRoute>
  );
};

// ─── LECTURER DASHBOARD ───────────────────────────────────────────────────────
const LecturerDashboard = ({ page, setPage, students, setStudents, predHistory, addPred, setPredHist, interventions, addIntervention, globalSearch="", setGlobalSearch, depts=DEPTS, auditLog=[], addAudit }) => {
  const { user } = useContext(AuthCtx);
  const myStudents = students.filter(s => s.dept === user.dept);
  const [activeStudent, setActiveStudent] = useState(null);
  const [predResult, setPredResult] = useState(null);
  const [predStudent, setPredStudent] = useState(null);
  const [lecDrillFilter, setLecDrillFilter] = useState(null); // null | "all" | "risk" | "accuracy"

  const handlePredict = (s) => { setActiveStudent(s); setPage("make-prediction"); };
  const handlePredResult = (res, stu) => {
    setPredResult(res); setPredStudent(stu);
    addPred({ res, student:stu, ts:new Date().toISOString(), by:user.name, studentId:activeStudent?.id });
    addAudit?.({ action:`Prediction run: ${res.prediction===1?"At Risk":"Safe"} (${(res.risk*100).toFixed(1)}%)`, target:stu.name, by:user.name });
    // Update the student record with the data used in this prediction
    if(activeStudent?.id) {
      setStudents(prev => {
        const next = prev.map(s => s.id === activeStudent.id
          ? { ...s, att:+stu.att, gpa:+stu.gpa, fin:+stu.fin, study:+stu.study }
          : s
        );
        lsSet("dai_s", next);
        return next;
      });
    }
  };

  if(page === "students") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <div style={S.col(16)}>
        <div style={S.flex(0,"center","space-between")}>
          <h2 style={S.title}><i className="fa fa-users" style={{fontSize:18,marginRight:8}}></i>My Students</h2>
          <Btn onClick={() => setPage("add-student")} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-user-plus"></i> Add Student</Btn>
        </div>
        <StudentListTable students={myStudents} onView={s => { setActiveStudent(s); setPage("student-detail"); }} onPredict={handlePredict} onEdit={s => { setActiveStudent(s); setPage("edit-student"); }} role="lecturer" externalSearch={globalSearch} />
      </div>
    </RoleBasedRoute>
  );

  if(page === "add-student") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <Card>
        <StudentForm title="Add New Student" depts={depts} onBack={() => setPage("students")} existingStudents={students} onSave={s => {
          const newS = { ...s, id: Date.now(), lecturerId: user.id };
          setStudents(prev => {
            const next = dedupStudents([...prev, newS]);
            lsSet("dai_s", next);
            return next;
          });
          addAudit?.({ action:"Student added", target:s.name||"New Student", by:user.name });
          setPage("students");
        }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "edit-student" && activeStudent) return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <Card>
        <StudentForm title={`Edit: ${activeStudent.name}`} depts={depts} initial={{ ...activeStudent, firstName:activeStudent.name.split(" ")[0], lastName:activeStudent.name.split(" ").slice(1).join(" ") }} onBack={() => setPage("students")} existingStudents={students} onSave={updated => {
          setStudents(prev => {
            const next = prev.map(s => s.id===activeStudent.id ? {...s,...updated} : s);
            lsSet("dai_s", next);
            return next;
          });
          addAudit?.({ action:"Student record updated", target:activeStudent.name, by:user.name });
          setPage("students");
        }} />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "make-prediction") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <div style={S.grid("1fr 1fr",20)}>
        <Card>
          <CardHeader title={activeStudent ? `Predict for: ${activeStudent.name}` : "Make Prediction"} />
          <PredictionForm student={activeStudent} depts={depts} onResult={handlePredResult} onBack={() => setPage("students")} />
        </Card>
        <div>
          {predResult ? (
            <Card>
              <CardHeader title="Prediction Output" />
              <PredictionResultCard result={predResult} student={predStudent} />
            </Card>
          ) : (
            <Card>
              <div style={{ textAlign:"center", padding:"40px 20px", color:"var(--tx3)" }}>
                <div style={{ fontSize:40, marginBottom:12 }}><i className="fa fa-magic"></i></div>
                <p style={{ fontSize:13 }}>Results will appear here after running the prediction.</p>
              </div>
            </Card>
          )}
        </div>
      </div>
    </RoleBasedRoute>
  );

  if(page === "pred-history") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <Card>
        <CardHeader title="Prediction History" action={<span style={{ fontSize:12, color:"var(--tx3)" }}>Your students only</span>} />
        <PredHistoryTable
          history={predHistory.filter(h => myStudents.some(s=>s.id===h.studentId) || h.by===user.name)}
          onDelete={ts => {
            setPredHist(prev => {
              const next = prev.filter(h => h.ts !== ts);
              lsSet("dai_p", next);
              return next;
            });
          }}
        />
      </Card>
    </RoleBasedRoute>
  );

  if(page === "my-profile") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <EditableProfilePage role="lecturer" />
    </RoleBasedRoute>
  );

  if(page === "bulk-predict") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <BulkPredictionPage students={myStudents} addPred={addPred} userName={user.name} setStudents={setStudents} addAudit={addAudit} />
    </RoleBasedRoute>
  );

  if(page === "interventions") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <InterventionsPage students={myStudents} interventions={interventions} addIntervention={addIntervention} userName={user.name} role="lecturer" />
    </RoleBasedRoute>
  );

  if(page === "calendar") return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <CalendarPage />
    </RoleBasedRoute>
  );

  if(page === "student-detail" && activeStudent) {
    const pred = mlPredict(activeStudent.att, activeStudent.gpa, activeStudent.fin, activeStudent.study);
    return (
      <RoleBasedRoute allowed={["lecturer"]}>
        <div style={S.col(20)}>
          <Btn variant="ghost" size="sm" onClick={() => setPage("students")} style={{ marginBottom:4 }}>← Back to Students</Btn>
          <div style={{ ...S.card(24), background:"var(--sur2)", display:"flex", gap:20, alignItems:"center", boxShadow:"0 4px 16px rgba(0,0,0,.18)" }}>
            <div style={{ width:60, height:60, borderRadius:14, background:"var(--primary,#8b5cf6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:800, color:"#fff", flexShrink:0 }}>
              {activeStudent.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
            </div>
            <div>
              <div style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>{activeStudent.name}</div>
              <div style={{ fontSize:13, color:"var(--tx3)" }}>{activeStudent.sid} · {activeStudent.dept} · {activeStudent.year}</div>
              <div style={{ ...S.flex(6), marginTop:8 }}><RiskBadge risk={pred.prediction} score={pred.risk} /><FinBadge fin={activeStudent.fin} /></div>
            </div>
            <div style={{ marginLeft:"auto", ...S.flex(8) }}>
              <Btn variant="ghost" title="Download PDF Report" onClick={() => printStudentReport(activeStudent, interventions)}><i className="fa fa-file-text-o"></i> PDF Report</Btn>
              <Btn variant="ghost" title="Edit Student" onClick={() => { setActiveStudent(activeStudent); setPage("edit-student"); }}><i className="fa fa-pencil"></i> Edit</Btn>
              <Btn title="Run Prediction" onClick={() => handlePredict(activeStudent)} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-magic"></i> Predict</Btn>
            </div>
          </div>
          <SemesterComparison student={activeStudent} />
          <div style={S.grid("1fr 1fr",20)}>
            <Card>
              <CardHeader title="Academic Data" />
              <div style={S.grid("1fr 1fr",10)}>
                {[["Attendance",`${activeStudent.att}%`,activeStudent.att<70?"var(--red)":"var(--green)"],["GPA",activeStudent.gpa.toFixed(2),activeStudent.gpa<2?"var(--red)":"var(--green)"],["Study Hrs",`${activeStudent.study}h`,"var(--blue)"],["Financial",["Good","Moderate","Poor"][activeStudent.fin],["var(--green)","var(--amber)","var(--red)"][activeStudent.fin]]].map(([l,v,c])=>(
                  <div key={l} style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:9, padding:12 }}>
                    <div style={S.label}>{l}</div>
                    <div style={{ fontFamily:"var(--mono)", fontSize:18, fontWeight:700, color:c, marginTop:5 }}>{v}</div>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <CardHeader title="Prediction Result" />
              <PredictionResultCard result={pred} student={activeStudent} />
            </Card>
          </div>
          <InterventionPanel student={activeStudent} interventions={interventions} addIntervention={addIntervention} userName={user.name} />
          <div>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
              <div>
                <h3 style={{ fontSize:15, fontWeight:800, marginBottom:2 }}><i className="fa fa-tasks" style={{marginRight:8}}></i>Recommended Actions</h3>
                <p style={{ fontSize:12, color:"var(--tx3)" }}>Auto-generated action plan based on this student's risk profile.</p>
              </div>
            </div>
            <RecommendedActionsPanel student={activeStudent} interventions={interventions} addIntervention={addIntervention} userName={user.name} />
          </div>
        </div>
      </RoleBasedRoute>
    );
  }

  // Default dashboard
  const risk = myStudents.filter(s=>mlPredict(s.att,s.gpa,s.fin,s.study).prediction===1).length;

  const lecDrillStudents = lecDrillFilter === "all"  ? myStudents
                         : lecDrillFilter === "risk" ? myStudents.filter(s=>mlPredict(s.att,s.gpa,s.fin,s.study).prediction===1)
                         : [];
  const lecDrillColor = lecDrillFilter === "risk" ? "#ef4444" : lecDrillFilter === "accuracy" ? "#10b981" : "#8b5cf6";
  const lecDrillTitle = lecDrillFilter === "all"      ? "My Students"
                      : lecDrillFilter === "risk"     ? "At-Risk Students"
                      : lecDrillFilter === "accuracy" ? "Model Accuracy Breakdown"
                      : "";

  const ClickKPI = ({ label, value, sub, color, icon, fkey }) => (
    <div
      onClick={() => setLecDrillFilter(f => f === fkey ? null : fkey)}
      style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:`5px solid ${color}`, borderRadius:14, padding:20,
        position:"relative", overflow:"hidden", cursor:"pointer",
        boxShadow:"0 4px 18px rgba(0,0,0,.18)", transition:"box-shadow .2s" }}
      onMouseEnter={e=>{ e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,.35)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.boxShadow="0 4px 18px rgba(0,0,0,.18)"; }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:16 }}>
        {icon && <div style={{ width:48, height:48, borderRadius:12, background:`${color}18`, border:`1px solid ${color}25`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:color }}>{icon}</div>}
        <i className="fa fa-pencil" style={{ fontSize:11, color:color, opacity:.7 }}></i>
      </div>
      <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--tx2)", marginBottom:8 }}>{label}</div>
      <div style={{ fontFamily:"var(--mono)", fontSize:28, fontWeight:700, color, lineHeight:1.1 }}>{value}</div>
      {sub && <div style={{ fontSize:12, color:"var(--tx3)", marginTop:4 }}>{sub}</div>}
    </div>
  );

  return (
    <RoleBasedRoute allowed={["lecturer"]}>
      <div style={S.col(20)}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-book" style={{fontSize:18,marginRight:8}}></i>Lecturer Dashboard</h2>
            <p style={S.sub}>Welcome, {user.name}. Managing {myStudents.length} students.</p>
            <div style={{ height:1, background:"#000", marginTop:16 }} />
          </div>
          <div style={S.flex(8)}>
            <Btn variant="ghost" title="Add New Student" onClick={() => setPage("add-student")}><i className="fa fa-plus"></i> Add Student</Btn>
            <Btn title="Make a Prediction" onClick={() => setPage("make-prediction")} style={{ background:"var(--primary,#8b5cf6)" }}><i className="fa fa-magic"></i> Make Prediction</Btn>
          </div>
        </div>

        <div style={S.grid("repeat(3,1fr)",16)}>
          <ClickKPI label="My Students"    value={myStudents.length} color="#8b5cf6" icon={<i className="fa fa-users"></i>} sub="Total assigned"                                                                    fkey="all" />
          <ClickKPI label="At Risk"        value={risk}              color="#ef4444" icon={<i className="fa fa-exclamation-triangle"></i>} sub={`${myStudents.length?((risk/myStudents.length)*100).toFixed(0):0}% of my students`} fkey="risk" />
          <ClickKPI label="Model Accuracy" value="82.5%"             color="#10b981" icon={<i className="fa fa-bullseye"></i>} sub="Prediction reliability"                                                             fkey="accuracy" />
        </div>

        {/* ── Drill-Down Panel ── */}
        {lecDrillFilter && (
          <div style={{ background:"var(--sur)", border:`1px solid ${lecDrillColor}40`, borderRadius:14, padding:20, animation:"fadeUp .25s ease" }}>
            <div style={{ ...S.flex(0,"center","space-between"), marginBottom:16 }}>
              <div style={S.flex(10,"center")}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:lecDrillColor }} />
                <span style={{ fontSize:15, fontWeight:800 }}>{lecDrillTitle}</span>
                {lecDrillFilter !== "accuracy" && <span style={{ ...S.tag(lecDrillColor), fontSize:11 }}>{lecDrillStudents.length} students</span>}
              </div>
              <Btn size="sm" variant="ghost" onClick={() => setLecDrillFilter(null)}><i className="fa fa-times"></i> Close</Btn>
            </div>

            {lecDrillFilter === "accuracy" ? (
              <div style={S.col(16)}>
                <div style={S.grid("repeat(4,1fr)",12)}>
                  {[
                    ["Test Accuracy",  "82.5%", "#f59e0b", "40 test samples"],
                    ["Train Accuracy", "89.4%", "#10b981", "160 train samples"],
                    ["Precision",      "80.0%", "#3b82f6", "Of predicted at-risk"],
                    ["Recall",         "80.0%", "#8b5cf6", "Of actual at-risk"],
                  ].map(([label, value, color, note]) => (
                    <div key={label} style={{ background:"var(--sur2)", border:`1px solid ${color}30`, borderRadius:10, padding:14, textAlign:"center" }}>
                      <div style={{ fontFamily:"var(--mono)", fontSize:24, fontWeight:800, color }}>{value}</div>
                      <div style={{ fontSize:11, fontWeight:700, color:"var(--tx2)", margin:"4px 0 2px" }}>{label}</div>
                      <div style={{ fontSize:10, color:"var(--tx3)" }}>{note}</div>
                    </div>
                  ))}
                </div>
                <div style={S.grid("1fr 1fr",16)}>
                  <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:16 }}>
                    <div style={{ ...S.label, marginBottom:12 }}>Confusion Matrix</div>
                    <div style={S.grid("1fr 1fr",8)}>
                      {[
                        ["True Positive",  "16", "#10b981", "Correctly predicted at-risk"],
                        ["False Negative",  "4", "#ef4444", "Missed at-risk students"],
                        ["False Positive",  "3", "#ef4444", "Wrongly flagged as at-risk"],
                        ["True Negative",  "17", "#10b981", "Correctly predicted safe"],
                      ].map(([label, val, color, note]) => (
                        <div key={label} style={{ background:`${color}10`, border:`1px solid ${color}30`, borderRadius:8, padding:12, textAlign:"center" }}>
                          <div style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:800, color }}>{val}</div>
                          <div style={{ fontSize:10, fontWeight:700, color:"var(--tx2)", marginTop:3 }}>{label}</div>
                          <div style={{ fontSize:9, color:"var(--tx3)", marginTop:2 }}>{note}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:10, padding:16 }}>
                    <div style={{ ...S.label, marginBottom:12 }}>Feature Coefficients</div>
                    {[
                      ["Attendance",  -0.0523, "#0ea5e9"],
                      ["GPA",         -0.9821, "#10b981"],
                      ["Financial",    0.6134, "#ef4444"],
                      ["Study Hours", -0.0812, "#f59e0b"],
                    ].map(([name, val, color]) => (
                      <div key={name} style={{ ...S.flex(8,"center"), marginBottom:10 }}>
                        <div style={{ fontSize:12, color:"var(--tx3)", width:90, flexShrink:0 }}>{name}</div>
                        <div style={{ flex:1, height:6, background:"rgba(255,255,255,.05)", borderRadius:3, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${Math.abs(val)*100}%`, background:color, borderRadius:3 }} />
                        </div>
                        <div style={{ fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color:val<0?"var(--green)":"var(--red)", width:52, textAlign:"right" }}>
                          {val>0?"+":""}{val}
                        </div>
                      </div>
                    ))}
                    <div style={{ marginTop:10, fontSize:11, color:"var(--tx3)", lineHeight:1.6, borderTop:"1px solid var(--bdr)", paddingTop:10 }}>
                      Algorithm: <span style={{ color:"var(--tx2)", fontWeight:600 }}>Logistic Regression</span> · AUC-ROC: <span style={{ color:"var(--tx2)", fontWeight:600 }}>~0.87</span> · F1 Score: <span style={{ color:"var(--tx2)", fontWeight:600 }}>80.0%</span>
                    </div>
                  </div>
                </div>
              </div>
            ) : lecDrillStudents.length === 0 ? (
              <Empty icon={<i className="fa fa-check-circle" style={{fontSize:36,color:"var(--tx3)"}}></i>} text="No students in this group." />
            ) : (
              <StudentListTable
                students={lecDrillStudents}
                onView={s => { setActiveStudent(s); setPage("student-detail"); }}
                onPredict={handlePredict}
                onEdit={s => { setActiveStudent(s); setPage("edit-student"); }}
                role="lecturer"
              />
            )}
          </div>
        )}

        <Card>
          <CardHeader title="My Students" action={<Btn size="sm" variant="ghost" onClick={() => setPage("students")}>View All →</Btn>} />
          <StudentListTable students={myStudents.slice(0,6)} onView={s=>{setActiveStudent(s);setPage("student-detail");}} onPredict={handlePredict} onEdit={s=>{setActiveStudent(s);setPage("edit-student");}} role="lecturer" externalSearch={globalSearch} />
        </Card>
      </div>
    </RoleBasedRoute>
  );
};

const DepartmentsPage = ({ students, users, setPage, depts=DEPTS, setDepts, setStudents }) => {
  const [search, setSearch] = useState("");
  const [expandedDept, setExpandedDept] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editingDept, setEditingDept] = useState(null); // name of dept being edited
  const [form, setForm] = useState({ name:"", code:"", description:"" });
  const [formError, setFormError] = useState("");
  const [successMsg, setSuccessMsg] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null); // dept name to confirm delete

  const allDepts = Array.from(new Set([...depts, ...students.map(s=>s.dept), ...users.filter(u=>u.role==="lecturer").map(u=>u.dept)].filter(Boolean)));
  const filtered = allDepts.filter(d => d.toLowerCase().includes(search.toLowerCase()));

  const openAdd = () => {
    setEditingDept(null);
    setForm({ name:"", code:"", description:"" });
    setFormError("");
    setShowForm(true);
  };

  const openEdit = (dept) => {
    setEditingDept(dept);
    setForm({ name:dept, code:"", description:"" });
    setFormError("");
    setShowForm(true);
  };

  const submitDept = () => {
    const name = form.name.trim();
    if(!name) { setFormError("Department name is required."); return; }
    if(editingDept) {
      // Edit — rename department everywhere
      if(name.toLowerCase() !== editingDept.toLowerCase() && allDepts.map(d=>d.toLowerCase()).includes(name.toLowerCase())) {
        setFormError("A department with this name already exists."); return;
      }
      if(setDepts) setDepts(prev => prev.map(d => d===editingDept ? name : d));
      // Update students and users in same dept
      if(setStudents) setStudents(prev => prev.map(s => s.dept===editingDept ? {...s, dept:name} : s));
      setSuccessMsg(`Department renamed to "${name}" successfully.`);
    } else {
      // Add new
      if(allDepts.map(d=>d.toLowerCase()).includes(name.toLowerCase())) { setFormError("This department already exists."); return; }
      if(setDepts) setDepts(prev => [...prev, name]);
      setSuccessMsg(`"${name}" department added successfully.`);
    }
    setForm({ name:"", code:"", description:"" });
    setFormError("");
    setShowForm(false);
    setEditingDept(null);
    setTimeout(() => setSuccessMsg(""), 3500);
  };

  const deleteDept = (dept) => {
    const hasStudents = students.some(s => s.dept === dept);
    const hasLecturers = users.some(u => u.role==="lecturer" && u.dept === dept);
    if(hasStudents || hasLecturers) {
      setConfirmDelete(dept);
    } else {
      // Safe to delete directly
      if(setDepts) setDepts(prev => prev.filter(d => d !== dept));
      setSuccessMsg(`"${dept}" deleted.`);
      setTimeout(() => setSuccessMsg(""), 3000);
    }
  };

  const forceDelete = (dept) => {
    if(setDepts) setDepts(prev => prev.filter(d => d !== dept));
    if(setStudents) setStudents(prev => prev.map(s => s.dept===dept ? {...s, dept:"Unassigned"} : s));
    setConfirmDelete(null);
    setSuccessMsg(`"${dept}" deleted. Affected members moved to "Unassigned".`);
    setTimeout(() => setSuccessMsg(""), 4000);
  };

  return (
    <div style={S.col(20)}>

      {/* Add Department Modal */}
      {showForm && (
        <div onClick={() => { setShowForm(false); setFormError(""); }}
          style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e => e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:18, width:"100%", maxWidth:480, boxShadow:"0 24px 64px rgba(0,0,0,0.6)", animation:"fadeUp .2s ease" }}>

            {/* Modal header */}
            <div style={{ padding:"18px 24px", borderBottom:"1px solid var(--bdr)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:40, height:40, borderRadius:10, background:"rgba(245,158,11,.15)", border:"1px solid rgba(245,158,11,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, color:"#f59e0b" }}>
                  <i className={`fa fa-${editingDept ? "pencil" : "building"}`}></i>
                </div>
                <div>
                  <div style={{ fontSize:15, fontWeight:800, color:"var(--tx)" }}>{editingDept ? `Edit "${editingDept}"` : "Add New Department"}</div>
                  <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{editingDept ? "Rename this department" : "Fill in the details below"}</div>
                </div>
              </div>
              <button onClick={() => { setShowForm(false); setFormError(""); setEditingDept(null); }}
                style={{ width:32, height:32, borderRadius:8, border:"1px solid var(--bdr)", background:"var(--sur2)", cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--tx2)" }}>
                <i className="fa fa-times"></i>
              </button>
            </div>

            {/* Modal body */}
            <div style={{ padding:"20px 24px" }}>
              <FieldGroup label="Department Name" required>
                <input
                  value={form.name}
                  onChange={e => { setForm(f=>({...f, name:e.target.value})); setFormError(""); }}
                  onKeyDown={e => e.key==="Enter" && submitDept()}
                  placeholder="e.g. Computer Science"
                  autoFocus
                />
              </FieldGroup>
              <FieldGroup label="Department Code (optional)">
                <input
                  value={form.code}
                  onChange={e => setForm(f=>({...f, code:e.target.value}))}
                  placeholder="e.g. CS, IT, ENG"
                />
              </FieldGroup>
              <FieldGroup label="Description (optional)">
                <textarea
                  value={form.description}
                  onChange={e => setForm(f=>({...f, description:e.target.value}))}
                  placeholder="Brief description of the department…"
                  style={{ minHeight:72 }}
                />
              </FieldGroup>
              {formError && (
                <Alert type="error" style={{ marginBottom:12 }}>
                  <i className="fa fa-exclamation-triangle" style={{marginRight:6}}></i>{formError}
                </Alert>
              )}
            </div>

            {/* Modal footer */}
            <div style={{ padding:"14px 24px", borderTop:"1px solid var(--bdr)", display:"flex", gap:10, justifyContent:"flex-end" }}>
              <Btn variant="ghost" onClick={() => { setShowForm(false); setFormError(""); setEditingDept(null); }}>Cancel</Btn>
              <Btn onClick={submitDept} style={{ background:"#f59e0b", color:"#000" }}>
                <i className="fa fa-check"></i> {editingDept ? "Save Changes" : "Add Department"}
              </Btn>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={S.flex(0,"flex-start","space-between")}>
          <div>
            <h2 style={{ ...S.title, marginBottom:4 }}><i className="fa fa-building" style={{fontSize:18,marginRight:8}}></i>Departments</h2>
            <p style={S.sub}>Overview of all academic departments, their lecturers and enrolled students.</p>
          </div>
          <Btn onClick={openAdd} title="Add New Department" style={{ background:"var(--primary,#f59e0b)", color:"#000" }}>
            <i className="fa fa-plus"></i> Add Department
          </Btn>
        </div>
        <div style={{ height:1, background:"#000", width:"100%" }} />
      </div>

      {/* Confirm Delete Modal */}
      {confirmDelete && (
        <div onClick={() => setConfirmDelete(null)}
          style={{ position:"fixed", inset:0, zIndex:500, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:24, backdropFilter:"blur(4px)" }}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderRadius:18, width:"100%", maxWidth:420, boxShadow:"0 24px 64px rgba(0,0,0,0.6)", animation:"fadeUp .2s ease", padding:28 }}>
            <div style={{ width:48, height:48, borderRadius:12, background:"rgba(239,68,68,.15)", border:"1px solid rgba(239,68,68,.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, color:"var(--red)", marginBottom:16 }}>
              <i className="fa fa-trash"></i>
            </div>
            <div style={{ fontSize:16, fontWeight:800, color:"var(--tx)", marginBottom:8 }}>Delete "{confirmDelete}"?</div>
            <div style={{ fontSize:13, color:"var(--tx3)", lineHeight:1.7, marginBottom:20 }}>
              This department has students or lecturers assigned to it.<br/>
              They will be moved to <strong style={{color:"var(--amber)"}}>Unassigned</strong> if you proceed.
            </div>
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <Btn variant="ghost" onClick={()=>setConfirmDelete(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={()=>forceDelete(confirmDelete)}>
                <i className="fa fa-trash"></i> Delete Anyway
              </Btn>
            </div>
          </div>
        </div>
      )}

      {/* Success message */}
      {successMsg && (
        <div style={{ background:"rgba(16,185,129,.1)", border:"1px solid rgba(16,185,129,.3)", borderRadius:8, padding:"10px 16px", fontSize:13, color:"var(--green)", display:"flex", alignItems:"center", gap:8 }}>
          <i className="fa fa-check-circle"></i> {successMsg}
        </div>
      )}

      {/* Search */}
      <div style={{ position:"relative", maxWidth:320 }}>
        <i className="fa fa-search" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--tx3)", fontSize:13, pointerEvents:"none" }}></i>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search departments…" style={{ paddingLeft:30 }} />
      </div>

      {/* Department cards */}
      <div style={S.grid("repeat(auto-fill,minmax(280px,1fr))", 16)}>
        {filtered.map(dept => {
          const deptStudents = students.filter(s => s.dept === dept);
          const deptLecturers = users.filter(u => u.role === "lecturer" && u.dept === dept);
          const atRisk = deptStudents.filter(s => mlPredict(s.att, s.gpa, s.fin, s.study).prediction === 1).length;
          const isExpanded = expandedDept === dept;
          const riskPct = deptStudents.length ? ((atRisk/deptStudents.length)*100).toFixed(0) : 0;
          const riskColor = riskPct >= 50 ? "#ef4444" : riskPct >= 25 ? "#f59e0b" : "#10b981";

          return (
            <div key={dept} style={{ background:"var(--sur)", border:"1px solid var(--bdr)", borderLeft:"5px solid var(--primary,#f59e0b)", borderRadius:14, padding:20, boxShadow:"0 4px 18px rgba(0,0,0,.18)", transition:"box-shadow .2s" }}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,.28)"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow="0 4px 18px rgba(0,0,0,.18)"}>

              {/* Dept icon + name */}
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:14 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:44, height:44, borderRadius:10, background:"rgba(245,158,11,.15)", border:"1px solid rgba(245,158,11,.25)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, color:"#f59e0b" }}>
                    <i className="fa fa-building"></i>
                  </div>
                  <div>
                    <div style={{ fontSize:14, fontWeight:800, color:"var(--tx)", lineHeight:1.3 }}>{dept}</div>
                    <div style={{ fontSize:11, color:"var(--tx3)", marginTop:2 }}>{deptStudents.length} student{deptStudents.length!==1?"s":""} · {deptLecturers.length} lecturer{deptLecturers.length!==1?"s":""}</div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:6 }}>
                  <button onClick={()=>setExpandedDept(isExpanded?null:dept)} title="View Details"
                    style={{ background:"var(--sur2)", border:"1px solid var(--bdr)", borderRadius:7, padding:"4px 10px", cursor:"pointer", fontSize:11, fontWeight:700, color:"var(--tx2)" }}>
                    {isExpanded?"Hide":"Details"}
                  </button>
                  <button onClick={()=>openEdit(dept)} title="Edit Department"
                    style={{ width:28, height:28, background:"rgba(59,130,246,.1)", border:"1px solid rgba(59,130,246,.3)", borderRadius:7, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#3b82f6", fontSize:12 }}>
                    <i className="fa fa-pencil"></i>
                  </button>
                  <button onClick={()=>deleteDept(dept)} title="Delete Department"
                    style={{ width:28, height:28, background:"rgba(239,68,68,.1)", border:"1px solid rgba(239,68,68,.3)", borderRadius:7, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--red)", fontSize:12 }}>
                    <i className="fa fa-trash"></i>
                  </button>
                </div>
              </div>

              {/* Stats row */}
              <div style={{ display:"flex", gap:10, marginBottom: isExpanded ? 14 : 0 }}>
                <div style={{ flex:1, background:"rgba(59,130,246,.08)", borderRadius:8, padding:"8px 10px", textAlign:"center" }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:700, color:"#3b82f6" }}>{deptStudents.length}</div>
                  <div style={{ fontSize:10, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:".06em" }}>Students</div>
                </div>
                <div style={{ flex:1, background:"rgba(139,92,246,.08)", borderRadius:8, padding:"8px 10px", textAlign:"center" }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:700, color:"#8b5cf6" }}>{deptLecturers.length}</div>
                  <div style={{ fontSize:10, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:".06em" }}>Lecturers</div>
                </div>
                <div style={{ flex:1, background:`${riskColor}12`, borderRadius:8, padding:"8px 10px", textAlign:"center" }}>
                  <div style={{ fontFamily:"var(--mono)", fontSize:20, fontWeight:700, color:riskColor }}>{riskPct}%</div>
                  <div style={{ fontSize:10, color:"var(--tx3)", textTransform:"uppercase", letterSpacing:".06em" }}>At Risk</div>
                </div>
              </div>

              {/* Risk bar */}
              {deptStudents.length > 0 && (
                <div style={{ height:5, background:"rgba(255,255,255,.08)", borderRadius:3, overflow:"hidden", marginBottom: isExpanded ? 14 : 0 }}>
                  <div style={{ height:"100%", width:`${riskPct}%`, background:riskColor, borderRadius:3, transition:"width .8s ease" }} />
                </div>
              )}

              {/* Expanded: lecturers + students list */}
              {isExpanded && (
                <div style={S.col(10)}>
                  {deptLecturers.length > 0 && (
                    <div>
                      <div style={{ ...S.label, marginBottom:6 }}>Lecturers</div>
                      {deptLecturers.map(l => (
                        <div key={l.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid var(--bdr)" }}>
                          <div style={{ width:28, height:28, borderRadius:"50%", background:"rgba(139,92,246,.18)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"#8b5cf6", fontWeight:700, flexShrink:0 }}>
                            {l.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
                          </div>
                          <div>
                            <div style={{ fontSize:12, fontWeight:600 }}>{l.name}</div>
                            <div style={{ fontSize:10, color:"var(--tx3)" }}>{l.email}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {deptStudents.length > 0 && (
                    <div>
                      <div style={{ ...S.label, marginBottom:6, marginTop:6 }}>Students ({deptStudents.length})</div>
                      {deptStudents.slice(0,5).map(s => {
                        const pred = mlPredict(s.att, s.gpa, s.fin, s.study);
                        return (
                          <div key={s.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid var(--bdr)" }}>
                            <div>
                              <div style={{ fontSize:12, fontWeight:600 }}>{s.name}</div>
                              <div style={{ fontSize:10, color:"var(--tx3)" }}>{s.sid} · {s.year}</div>
                            </div>
                            <RiskBadge risk={pred.prediction} score={pred.risk} />
                          </div>
                        );
                      })}
                      {deptStudents.length > 5 && <div style={{ fontSize:11, color:"var(--tx3)", textAlign:"center", paddingTop:6 }}>+{deptStudents.length-5} more students</div>}
                    </div>
                  )}
                  {deptStudents.length === 0 && deptLecturers.length === 0 && (
                    <div style={{ textAlign:"center", padding:"12px 0", color:"var(--tx3)", fontSize:12 }}>No members yet in this department.</div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign:"center", padding:"40px 20px", color:"var(--tx3)" }}>
          <i className="fa fa-building" style={{ fontSize:36, marginBottom:10, display:"block" }}></i>
          <p>No departments match your search.</p>
        </div>
      )}
    </div>
  );
};

const AdminDashboard = ({ page, setPage, students, setStudents, users, setUsers, predHistory, addPred, setPredHist, interventions, addIntervention, globalSearch="", setGlobalSearch, depts=[], setDepts, auditLog=[], addAudit }) => {

  const [predStudent, setPredStudent] = useState(null);
  const [drillFilter, setDrillFilter] = useState(null);
  const [lecDrill, setLecDrill] = useState(null); // { lecId, filter } for lecturers page

  const handlePredict = (s) => { setActiveStudent(s); setPage("make-prediction"); };
  const handlePredResult = (res, stu) => {
    setPredResult(res); setPredStudent(stu);
    addPred({ res, student:stu, ts:new Date().toISOString(), by:user.name, studentId:activeStudent?.id });
    addAudit?.({ action:`Prediction run: ${res.prediction===1?"At Risk":"Safe"} (${(res.risk*100).toFixed(1)}%)`, target:stu.name, by:user.name });
    // Update the student record with the data used in this prediction
    if(activeStudent?.id) {
      setStudents(prev => {
        const next = prev.map(s => s.id === activeStudent.id
          ? { ...s, att:+stu.att, gpa:+stu.gpa, fin:+stu.fin, study:+stu.study }
          : s
        );
        lsSet("dai_s", next);
        return next;
      });
    }
  };

  const lecturers = users.filter(u => u.role === "lecturer");

  if(page === "students") return (
    <RoleBasedRoute allowed={["admin"]}>
      <div style={S.col(16)}>
        <div style={S.flex(0,"center","space-between")}>
          <h2 style={S.title}><i className="fa fa-users" style={{fontSize:18,marginRight:8}}></i>All Students</h2>
          <div style={S.flex(8)}>
            <Btn variant="ghost" title="Export to CSV" onClick={() => {
  const dateStr = new Date().toISOString().split("T")[0];
  const rows = [
    ["Student ID","Full Name","Department","Year","Attendance %","GPA","Financial Status","Study Hours/Day","Risk Score %","Prediction","Confidence %"],
    ...students.map(s => {
      const pred = mlPredict(s.att, s.gpa, s.fin, s.study);
      return [
        s.sid,
        s.name,
        s.dept,
        s.year,
        s.att,
        s.gpa,
        ["Good","Moderate","Poor"][s.fin] || "Unknown",
        s.study,
        (pred.risk*100).toFixed(2),
        pred.prediction===1 ? "At Risk" : "Safe",
        (pred.confidence*100).toFixed(2)
      ];
    })
  ];
  downloadCSV(`students_export_${dateStr}.csv`, rows);
}}><i className="fa fa-download"></i> Export CSV</Btn>
            <Btn title="Add New Student" onClick={() => setPage("add-student")} style={{ background:"var(--primary,#f59e0b)", color:"#000" }}><i className="fa fa-plus"></i> Add Student</Btn>

                          <div style={{ height:"100%", width:`${Math.abs(val)*100}%`, background:color, borderRadius:3 }} />

                        <div style={{ fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color: val<0?"var(--green)":"var(--red)", width:52, textAlign:"right" }}>

                      </div>
                    ))}
                    <div style={{ marginTop:10, fontSize:11, color:"var(--tx3)", lineHeight:1.6, borderTop:"1px solid var(--bdr)", paddingTop:10 }}>

                      F1 Score: <span style={{ color:"var(--tx2)", fontWeight:600 }}>80.0%</span>

              <StudentListTable
                students={drillStudents}

                onPredict={handlePredict}
                onEdit={s => { setActiveStudent(s); setPage("edit-student"); }}
                onDelete={id => setStudents(prev => prev.filter(s => s.id !== id))}
                role="admin"

            <CardHeader title="Donut Overview" />

              <Donut value={students.length-risk} total={students.length} color="#10b981" label="Safe"

        <Card>
          <CardHeader title="All Students Overview" action={<Btn size="sm" variant="ghost" onClick={() => setPage("students")}>Manage →</Btn>} />

      </div>
    </RoleBasedRoute>
  );
};

const EditableProfilePage = ({ role }) => {

    const file = e.target.files[0];
